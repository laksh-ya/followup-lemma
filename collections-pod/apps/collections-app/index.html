<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Collections Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
      :root{color-scheme:light;--paper:#f6f7f9;--card:#ffffff;--card2:#fbfcfe;--ink:#0f172a;--muted:#64748b;--line:#e6e9ef;--line2:#eef1f5;--accent:#4f46e5;--accent-ink:#ffffff;--accent-soft:#eef0fe;--sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--mono:ui-monospace,"SF Mono",Menlo,monospace;--chip:#f1f3f8;--low:#16a34a;--med:#d97706;--high:#dc2626;--blue:#2563eb;--purple:#7c3aed;--shadow:0 1px 2px rgba(15,23,42,.04),0 2px 8px rgba(15,23,42,.05);--shadow-lg:0 10px 30px rgba(15,23,42,.12);--serif:var(--sans);--gold:var(--accent);--glow:var(--card2);}
      [data-theme="dark"]{color-scheme:dark;--paper:#0b0f17;--card:#141a24;--card2:#111722;--ink:#e6eaf2;--muted:#93a1b5;--line:#232c3a;--line2:#1c2431;--accent:#818cf8;--accent-ink:#0b0f17;--accent-soft:#1b2137;--chip:#1b232f;--shadow:0 1px 2px rgba(0,0,0,.3);--shadow-lg:0 12px 34px rgba(0,0,0,.5);}
      *{box-sizing:border-box}
      body{margin:0;min-height:100dvh;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
      .wrap{max-width:1240px;margin:0 auto;padding:clamp(1rem,3vw,1.75rem)}
      svg.ic{width:1em;height:1em;display:inline-block;vertical-align:-.14em;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
      .top{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
      .brand{display:flex;align-items:center;gap:.7rem}
      .brand .logo{width:38px;height:38px;border-radius:10px;background:var(--accent);color:var(--accent-ink);display:grid;place-items:center;font-size:1.1rem;box-shadow:var(--shadow)}
      .eyebrow{font-size:.68rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:600}
      h1{font-weight:700;font-size:clamp(1.15rem,2.4vw,1.4rem);letter-spacing:-.02em;margin:0;line-height:1.1}
      .pill{display:inline-flex;align-items:center;gap:.4rem;font-size:.75rem;font-weight:500;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:.34rem .7rem}
      .pip{width:7px;height:7px;border-radius:50%;background:var(--low);box-shadow:0 0 0 3px color-mix(in srgb,var(--low) 22%,transparent)}
      .btn{display:inline-flex;align-items:center;gap:.4rem;font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:9px;padding:.5rem .85rem;font-weight:600;font-size:.82rem;transition:.14s;box-shadow:var(--shadow);white-space:nowrap}
      .btn:hover{border-color:color-mix(in srgb,var(--accent) 40%,var(--line));background:var(--card2)}
      .btn.gold{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);box-shadow:0 1px 2px rgba(79,70,229,.25)} .btn.gold:hover{background:color-mix(in srgb,var(--accent) 88%,#000);border-color:transparent}
      .btn.sm{padding:.34rem .6rem;font-size:.76rem;border-radius:8px} .btn.ghost{background:none;box-shadow:none;border-color:transparent} .btn.ghost:hover{background:var(--chip);border-color:transparent}
      .btn.danger{color:var(--high)} .btn.danger:hover{border-color:var(--high);background:color-mix(in srgb,var(--high) 8%,transparent)}
      .btn.good{color:var(--low)} .btn.good:hover{border-color:var(--low);background:color-mix(in srgb,var(--low) 9%,transparent)}
      .btn:disabled{opacity:.5;cursor:default}
      .iconbtn{display:inline-grid;place-items:center;width:34px;height:34px;padding:0;font-size:.98rem}
      .iconbtn.on{background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 35%,var(--line));color:var(--accent)}
      .menu{position:relative;display:inline-block}
      .menu .items{position:absolute;right:0;top:calc(100% + 6px);background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);padding:.4rem;min-width:220px;z-index:20;display:none}
      .menu.open .items{display:block}
      .menu .items button{display:flex;align-items:center;gap:.55rem;width:100%;text-align:left;font:inherit;font-weight:500;font-size:.83rem;background:none;border:none;color:var(--ink);padding:.5rem .55rem;border-radius:8px;cursor:pointer}
      .menu .items button:hover{background:var(--chip)} .menu .items button svg.ic{color:var(--muted)} .menu .items hr{border:none;border-top:1px solid var(--line);margin:.3rem 0}
      .tabs{display:flex;gap:.15rem;flex-wrap:wrap;margin:1.25rem 0 1.1rem;border-bottom:1px solid var(--line)}
      .tabs button{display:inline-flex;align-items:center;gap:.45rem;font:inherit;font-size:.84rem;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);padding:.55rem .8rem;position:relative;border-radius:8px 8px 0 0}
      .tabs button svg.ic{opacity:.8}
      .tabs button:hover{color:var(--ink);background:var(--card2)}
      .tabs button.on{color:var(--accent)} .tabs button.on::after{content:"";position:absolute;left:.5rem;right:.5rem;bottom:-1px;height:2px;background:var(--accent);border-radius:2px}
      .tabs .badge{display:inline-block;min-width:18px;text-align:center;font-size:.68rem;font-weight:700;background:var(--chip);border-radius:999px;padding:.05rem .4rem;color:var(--muted)}
      .tabs button.on .badge{background:var(--accent-soft);color:var(--accent)}
      .tabs .badge.hot{background:var(--high);color:#fff}
      .usecase{display:flex;gap:.55rem;align-items:center;color:var(--muted);border-radius:10px;padding:.1rem .1rem .9rem;margin-bottom:.4rem;font-size:.82rem}
      .usecase svg.ic{color:var(--accent);font-size:1rem}
      .usecase .who{font-weight:700;color:var(--ink)}
      .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.75rem;margin-bottom:1.1rem}
      .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:.9rem 1rem;box-shadow:var(--shadow)}
      .stat .n{font-size:1.55rem;font-weight:700;line-height:1;letter-spacing:-.02em} .stat .l{font-size:.72rem;color:var(--muted);margin-top:.4rem;font-weight:500}
      .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1.1rem 1.2rem;margin-bottom:1rem;box-shadow:var(--shadow)}
      .panel h2{font-weight:700;font-size:.98rem;letter-spacing:-.01em;margin:0 0 .8rem;display:flex;align-items:center;gap:.5rem} .panel h2 svg.ic{color:var(--muted);font-size:1rem}
      table{width:100%;border-collapse:collapse;font-size:.84rem} th{text-align:left;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;padding:.5rem .55rem;border-bottom:1px solid var(--line)}
      td{padding:.6rem .55rem;border-bottom:1px solid var(--line2);vertical-align:middle}
      tbody tr:last-child td{border-bottom:none}
      tr.clickable{cursor:pointer;transition:background .12s} tr.clickable:hover td{background:var(--card2)}
      .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
      .chip{display:inline-flex;align-items:center;gap:.25rem;font-size:.68rem;font-weight:600;padding:.16rem .5rem;border-radius:6px;white-space:nowrap;line-height:1.2}
      .muted{color:var(--muted)} .row-actions{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center}
      .empty{text-align:center;color:var(--muted);padding:2.4rem 1rem} .empty .big{font-size:1.15rem;font-weight:700;color:var(--ink);margin-bottom:.35rem;letter-spacing:-.01em}
      .empty svg.ic{font-size:1.9rem;color:var(--line);margin-bottom:.4rem;stroke-width:1.6}
      .scrim{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.2s;z-index:40} .scrim.on{opacity:1;pointer-events:auto}
      .drawer{position:fixed;top:0;right:0;height:100dvh;width:min(600px,96vw);background:var(--paper);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:50;overflow-y:auto} .drawer.on{transform:none}
      .drawer .dh{position:sticky;top:0;background:color-mix(in srgb,var(--paper) 88%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:1rem 1.2rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;z-index:2} .drawer .db{padding:1.1rem 1.2rem}
      .x{display:grid;place-items:center;width:32px;height:32px;font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);border-radius:8px;font-size:1.1rem;color:var(--muted);line-height:1} .x:hover{color:var(--ink);border-color:var(--muted)}
      .kv{display:grid;grid-template-columns:auto 1fr;gap:.45rem 1rem;font-size:.84rem;margin:.4rem 0 1rem} .kv .k{color:var(--muted)}
      .mail{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:.9rem 1rem;white-space:pre-wrap;font-size:.85rem;line-height:1.6} .mail .subj{font-weight:700;margin-bottom:.5rem;font-size:.95rem}
      .timeline{margin:.5rem 0 0;padding-left:.2rem} .timeline .ev{position:relative;padding:.35rem 0 .7rem .95rem;border-left:2px solid var(--line);margin-left:.2rem} .timeline .ev:last-child{border-color:transparent} .timeline .ev .dot{position:absolute;left:-6px;top:.5rem;width:9px;height:9px;border-radius:50%;background:var(--accent);border:2px solid var(--paper)} .timeline .ev .when{font-size:.72rem;color:var(--muted);font-variant-numeric:tabular-nums} .timeline .ev .what{font-size:.85rem}
      textarea,input,select{font:inherit;font-size:.85rem;width:100%;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:.5rem .65rem;transition:.12s} textarea:focus,input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
      textarea{min-height:120px;resize:vertical;line-height:1.55}
      label.fld{display:block;margin:.7rem 0} label.fld .lbl{font-size:.74rem;font-weight:600;color:var(--muted);margin-bottom:.3rem;display:block}
      .toggle{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.6rem 0;border-bottom:1px solid var(--line2);font-size:.86rem} .toggle:last-child{border-bottom:none}
      .sw{position:relative;display:inline-block;width:40px;height:23px;flex:none;cursor:pointer} .sw input{opacity:0;width:0;height:0} .sw .tk{position:absolute;inset:0;background:var(--line);border-radius:999px;transition:.16s} .sw .tk::before{content:"";position:absolute;top:2.5px;left:2.5px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.16s;box-shadow:0 1px 2px rgba(0,0,0,.2)} .sw input:checked+.tk{background:var(--accent)} .sw input:checked+.tk::before{transform:translateX(17px)}
      .grid2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem} @media(max-width:680px){.grid2{grid-template-columns:1fr}}
      .guide{background:var(--card2);border:1px solid var(--line2);border-radius:10px;padding:.75rem .9rem;font-size:.8rem;line-height:1.6;margin-top:.5rem} .guide code{font-family:var(--mono);font-size:.92em;background:var(--chip);padding:.08rem .35rem;border-radius:5px} .guide ol{margin:.3rem 0 0 1rem;padding:0}
      .center{min-height:80dvh;display:grid;place-items:center;text-align:center}
      .toast{position:fixed;bottom:1.3rem;left:50%;transform:translateX(-50%) translateY(2rem);background:var(--ink);color:var(--paper);padding:.65rem 1.1rem;border-radius:10px;font-size:.84rem;font-weight:500;opacity:0;transition:.24s;z-index:80;box-shadow:var(--shadow-lg)} .toast.on{opacity:1;transform:translateX(-50%)}
      .busy{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(3px);display:none;place-items:center;z-index:90} .busy.on{display:grid}
      .busy .box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1.4rem 1.8rem;text-align:center;min-width:220px;box-shadow:var(--shadow-lg)}
      .spin{display:inline-block;width:22px;height:22px;border:2.5px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite} @keyframes sp{to{transform:rotate(360deg)}}
      .working{display:flex;align-items:center;gap:.55rem;background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 24%,transparent);color:color-mix(in srgb,var(--accent) 80%,var(--ink));border-radius:10px;padding:.55rem .85rem;margin-bottom:1rem;font-size:.83rem;font-weight:500}
      .hero{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1.2rem;background:linear-gradient(120deg,var(--accent) 0%,color-mix(in srgb,var(--accent) 78%,var(--purple)) 100%);color:#fff;border-radius:16px;padding:1.3rem 1.5rem;margin-bottom:1rem;box-shadow:0 8px 24px color-mix(in srgb,var(--accent) 28%,transparent)}
      .hero .big{font-size:clamp(1.8rem,4.5vw,2.5rem);font-weight:800;line-height:1;letter-spacing:-.025em}
      .hero .sub{font-size:.78rem;opacity:.85;margin-top:.5rem;font-weight:500}
      .hero .minis{display:flex;gap:1.6rem}
      .hero .mini .n{font-size:1.5rem;line-height:1;font-weight:700}
      .hero .mini .l{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;opacity:.8;margin-top:.35rem;font-weight:600}
      .needs{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.75rem;margin-bottom:1rem}
      .acard{cursor:pointer;text-align:left;font:inherit;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:.9rem 1rem;transition:.14s;box-shadow:var(--shadow);position:relative;overflow:hidden}
      .acard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac,var(--accent))}
      .acard:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
      .acard .acn{font-size:1.6rem;line-height:1;font-weight:700;color:var(--ac,var(--ink));letter-spacing:-.02em}
      .acard .acl{font-weight:700;font-size:.85rem;margin-top:.35rem;display:flex;align-items:center;gap:.4rem} .acard .acl svg.ic{color:var(--ac,var(--muted))}
      .acard .acs{font-size:.74rem;color:var(--muted);margin-top:.15rem}
      .allclear{display:flex;align-items:center;gap:.7rem;background:color-mix(in srgb,var(--low) 9%,transparent);border:1px solid color-mix(in srgb,var(--low) 28%,transparent);border-radius:12px;padding:.9rem 1.1rem;margin-bottom:1rem;font-size:.86rem} .allclear svg.ic{color:var(--low);font-size:1.2rem}
      .split{display:grid;grid-template-columns:1fr 1fr;gap:1rem}@media(max-width:760px){.split{grid-template-columns:1fr}}
      .seg{display:inline-flex;background:var(--chip);border-radius:9px;padding:3px;gap:2px} .seg button{border:none;background:none;font:inherit;font-weight:600;font-size:.8rem;color:var(--muted);padding:.35rem .7rem;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:.35rem} .seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
      .field-in{width:auto;display:inline-flex;align-items:center;gap:.4rem;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:.3rem .55rem}
      .conn{display:inline-flex;align-items:center;gap:.35rem;font-size:.72rem;font-weight:600;padding:.2rem .5rem;border-radius:6px} .conn.ok{background:color-mix(in srgb,var(--low) 12%,transparent);color:var(--low)} .conn.no{background:var(--chip);color:var(--muted)}
    </style>
  </head>
  <body>
    <div id="app"><div class="center"><p>Loading Collections Agent…</p></div></div>
    <div class="scrim" id="scrim" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer"></div>
    <div class="toast" id="toast"></div>
    <div class="busy" id="busy"><div class="box"><div class="spin"></div><p id="busymsg" style="margin:.7rem 0 0">Working…</p></div></div>
    <input type="file" id="csvfile" accept=".csv,.xlsx,.xls" style="display:none" />

    <script>
      (function(){var cfg=window.__LEMMA_CONFIG__||{};var base=(cfg.apiUrl||location.origin).replace(/\/$/,"");var c=document.createElement("script");c.src=base+"/public/sdk/lemma-client.js";c.onload=function(){var u=document.createElement("script");u.src=base+"/public/sdk/lemma-ui.js";u.onload=boot;u.onerror=boot;document.head.appendChild(u)};c.onerror=function(){fatal("Couldn't load the Lemma SDK.")};document.head.appendChild(c);})();
      var client,ME={},STATE={clients:[],invoices:[],drafts:[],interactions:[],promises:[],config:{},statsChannels:[]},TAB="dashboard";
      function $(id){return document.getElementById(id)}
      function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})}
      function field(r,k){return (r&&r.data&&r.data[k]!=null)?r.data[k]:(r?r[k]:undefined)}
      function listOf(r){return (r&&(r.items||r.data))||(Array.isArray(r)?r:[])}
      function fatal(m){$("app").innerHTML='<div class="center"><div><div style="font-size:2rem;color:var(--high)">'+ic("alert")+'</div><p>'+esc(m)+'</p></div></div>'}
      function theme(){try{return localStorage.getItem("ca-theme")||"light"}catch(e){return "light"}}
      function applyTheme(t){document.documentElement.setAttribute("data-theme",t);try{localStorage.setItem("ca-theme",t)}catch(e){}}
      function toast(m){var t=$("toast");t.textContent=m;t.classList.add("on");setTimeout(function(){t.classList.remove("on")},2600)}
      function setBusy(on,msg){$("busy").classList.toggle("on",!!on);if(msg)$("busymsg").textContent=msg}
      function money(v,cur){cur=cur||"INR";return (cur==="INR"?"₹":cur+" ")+Number(v||0).toLocaleString("en-IN")}
      // Full timestamp everywhere (date + time). ts = long, dt = same (kept for call-sites).
      function ts(s){if(!s)return"—";var d=new Date(s);return isNaN(d)?String(s):d.toLocaleString(undefined,{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
      function dt(s){return ts(s)}
      function shortDate(s){return ts(s)}
      // ---- inline SVG icons (Lucide-style). ic("name") → <svg…>. No emojis anywhere.
      var ICONS={
        dashboard:'<rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>',
        file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/>',
        inbox:'<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5.5 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.4-6.5A2 2 0 0 0 16.8 4H7.2a2 2 0 0 0-1.7 1.1z"/>',
        reply:'<path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 5 5v3"/>',
        users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.9"/><path d="M16 3.1a4 4 0 0 1 0 7.8"/>',
        calendar:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
        book:'<path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/>',
        chat:'<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22z"/>',

        var moreBtn=acts.length>8?'<button class="btn sm ghost" onclick="STATE.dashAllLog='+(!showAll)+';renderView()">'+(showAll?'Show less ↑':'Full activity log ('+acts.length+') ↓')+'</button>':'';

        return uc("Finance team","at-a-glance health of the book — the one number that matters, what needs you, and what the agent has handled on its own.")+
          hero+needs+

        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">Setup</div><h1 style="font-size:1.3rem">Set everything up</h1></div><button class="x" onclick="closeDrawer()">'+ic("x")+'</button></div><div class="db">'+
          '<p class="muted" style="font-size:.82rem">The technical wiring lives here so the rest of the app stays clean. On this pod, Slack (#legal, #daily-stats, #chat) and Telegram chat are <b>already connected</b> — these steps are for reconnecting or setting up a fresh copy. Run them where the Lemma CLI is signed in.</p>'+
          sec("sheet","Google Sheets — import invoices",'Load real data.<ol><li><code>lemma connectors auth-configs create google_sheets --name workspace-sheets</code></li><li><code>lemma connectors connect-requests create google_sheets --auth-config-id &lt;id&gt;</code> → authorize Google.</li><li>Data menu ▸ <b>Import from Google Sheets</b>, paste the link.</li></ol>')+
          sec("send","Gmail — send real follow-ups",'<ol><li><code>lemma connectors auth-configs create gmail --name workspace-gmail</code></li><li><code>lemma connectors connect-requests create gmail --auth-config-id &lt;id&gt;</code> → authorize Google.</li><li>Settings ▸ Email delivery ▸ Mode = Gmail, flip <b>Send real email</b> on.</li></ol>')+
          sec("hash","Slack — #legal &amp; #daily-stats posts",'One connector powers the legal escalations and the stats digest, pinned to a fixed workspace account.<ol><li><code>lemma connectors auth-configs create slack --name slack</code> → connect an account.</li><li>Invite the app to <b>#legal</b> and <b>#daily-stats</b>.</li><li>Wire the ids (admin, one-time): <code>save_config</code> → <code>slack_account_id</code>, <code>slack_legal_channel</code>; <code>save_stats_channel</code> → SLACK <code>destination</code> = #daily-stats id.</li></ol>')+
          sec("chat","Slack #chat — chat with the pod",'A Slack <b>surface</b> routes a channel to the concierge agent.<ol><li><code>lemma surfaces upsert slack --agent collections-concierge --account &lt;slack-account-id&gt;</code></li><li><code>lemma surfaces channels slack --channel-id &lt;C…&gt; --channel-name chat --agent collections-concierge</code></li><li><code>lemma surfaces setup slack</code> → paste the webhook URL into your Slack app&rsquo;s Event Subscriptions, then message <b>#chat</b>.</li></ol>')+
          sec("telegram","Telegram — chat &amp; stats digest",'<b>Chat</b> (no token): <code>lemma surfaces upsert telegram --agent collections-concierge</code> → <code>lemma surfaces setup telegram</code>, open the <b>t.me</b> link, message the bot.<br><br><b>Stats digest</b> needs a bot token (the connector has no send op): <b>@BotFather</b> ▸ <code>/newbot</code> ▸ store the token via <code>save_config</code> → <code>telegram_bot_token</code>, and the chat id via <code>save_stats_channel</code> → TELEGRAM <code>destination</code>.')+
          sec("clock","Automatic digest schedule",'The Schedule tab&rsquo;s day/time drives delivery; the sweep runs every 30 min once resumed: <code>lemma schedules resume stats-dispatch</code> (pause: <code>lemma schedules pause stats-dispatch</code>).')+
        '</div>';openDrawerEl();
      };

      function openDrawerEl(){$("scrim").classList.add("on");$("drawer").classList.add("on")}
      window.closeDrawer=function(){$("scrim").classList.remove("on");$("drawer").classList.remove("on")};
      window.changeStatus=async function(id, status){
        if(!confirm("Are you sure you want to change the status of this invoice to "+status+"?"))return;
        setBusy(true,"Updating status…");
        try{
          await invokeFn("app_action",{action:"change_status",invoice_id:id,config:{status:status}});
          await loadData();
          render(true);
          openInvoice(id);
          toast("Status updated to "+status);
        }catch(e){
          toast("⚠ "+e.message);
        }
        setBusy(false);
      };
      window.exportSentCSV=function(){
        var rows=[["customer_name","customer_email","invoice_no","subject","body","stage","status","sent_at"]];
        var sent=STATE.drafts.filter(function(d){return ["SENT","AUTO_SENT"].indexOf(field(d,"status"))>=0});
        sent.forEach(function(d){
          var i=invoiceOf(field(d,"invoice_id")),c=clientOf(field(d,"client_id"));
          rows.push([
            field(c,"name"),
            field(c,"email"),
            field(i,"invoice_no"),
            field(d,"subject"),
            field(d,"body"),
            field(d,"stage"),
            field(d,"status"),
            field(d,"created_at")
          ]);
        });
        var csv=rows.map(function(r){return r.map(function(x){x=String(x==null?"":x);return /[",\n]/.test(x)?'"'+x.replace(/"/g,'""')+'"':x}).join(",")}).join("\n");
        var blob=new Blob([csv],{type:"text/csv"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="sent_emails_export.csv";a.click();toast("Exported "+sent.length+" sent emails");
      };
      window.openSentEmail=function(draftId){
        var d=STATE.drafts.find(function(x){return field(x,"id")===draftId});
        if(!d)return;
        var i=invoiceOf(field(d,"invoice_id")),c=clientOf(field(d,"client_id"));
        var method = field(d,"status")==="AUTO_SENT"?"Auto-sent by AI":"Approved by human reviewer";
        var confidence = field(d,"confidence_score") != null ? (Math.round(field(d,"confidence_score")*100)+"%") : "N/A";
        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">Sent Communication</div><h1 style="font-size:1.3rem">'+esc(field(c,"name")||"")+'</h1></div><button class="x" onclick="closeDrawer()">×</button></div>'+
          '<div class="db">'+
            '<div class="kv">'+
              '<span class="k">Invoice</span><span>'+esc(field(i,"invoice_no")||"")+'</span>'+
              '<span class="k">Stage</span><span>'+stageChip(field(d,"stage"))+'</span>'+
              '<span class="k">Method</span><span>'+chip(field(d,"status")==="AUTO_SENT"?"Auto-sent":"Approved",field(d,"status")==="AUTO_SENT"?"--blue":"--low")+' ('+method+')</span>'+
              '<span class="k">Confidence</span><span>'+confidence+'</span>'+
              '<span class="k">Sent At</span><span>'+dt(field(d,"created_at"))+'</span>'+
            '</div>'+
            '<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:1.2rem 0 .5rem">Email Content</h2>'+
            '<div class="mail"><div class="subj">'+esc(field(d,"subject"))+'</div>'+esc(field(d,"body"))+'</div>'+
            '<div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap">'+
              '<button class="btn sm" onclick="openInvoice(\''+field(d,"invoice_id")+'\')">View invoice</button>'+
              '<button class="btn sm gold" onclick="simulateReplyForInvoice(\''+field(d,"invoice_id")+'\')">'+ic("chat")+' Simulate reply</button>'+
              '<button class="btn sm ghost" onclick="closeDrawer()">Close</button>'+
            '</div>'+
          '</div>';
        openDrawerEl();
      };
      window.openInvoice=function(id){
        var i=invoiceOf(id),c=clientOf(field(i,"client_id"));
        var d=latestDraft(id,["PENDING_REVIEW","AUTO_SENT","SENT","FAILED","REJECTED"]);
        var evs=STATE.interactions.filter(function(e){return field(e,"invoice_id")===id});
        var pending=d&&field(d,"status")==="PENDING_REVIEW";
        var mailHtml=d?('<div class="mail"><div class="subj">'+esc(field(d,"subject"))+'</div>'+(pending?'<textarea id="edit_body">'+esc(field(d,"body"))+'</textarea>':esc(field(d,"body")))+'</div>'):'<div class="muted">No draft yet.</div>';
        var acts=pending?'<div class="row-actions" style="margin-top:.7rem"><button class="btn gold sm" onclick="approveEdited(\''+field(d,"id")+'\')">Approve &amp; send</button><button class="btn sm danger" onclick="reject(\''+field(d,"id")+'\');closeDrawer()">Reject</button><button class="btn sm danger" onclick="flag(\''+field(d,"id")+'\');closeDrawer()">Legal</button></div>':'';
        
        var drawerActions = "";
        if (field(i,"status") === "ACTIVE") {
          drawerActions += '<button class="btn sm" onclick="doProcess(\''+id+'\')">Process now</button> '+
            '<button class="btn sm" onclick="doProcess(\''+id+'\')">Regenerate</button> ';
        }
        
        var statusButtons = "";
        var currentStatus = field(i,"status");
        if (currentStatus === "ACTIVE") {
          statusButtons = '<button class="btn sm good" onclick="changeStatus(\''+id+'\',\'PAID\')">'+ic("check")+' Paid</button> '+
            '<button class="btn sm" onclick="changeStatus(\''+id+'\',\'PAUSED\')">⏸ Pause</button> '+
            '<button class="btn sm" onclick="changeStatus(\''+id+'\',\'DISPUTED\')">⚡ Dispute</button> '+
            '<button class="btn sm danger" onclick="changeStatus(\''+id+'\',\'LEGAL\')">'+ic("scale")+' Legal</button>';
        } else if (currentStatus === "PAUSED" || currentStatus === "DISPUTED") {
          statusButtons = '<button class="btn sm gold" onclick="changeStatus(\''+id+'\',\'ACTIVE\')">▶ Reactivate</button> '+
            '<button class="btn sm danger" onclick="changeStatus(\''+id+'\',\'LEGAL\')">'+ic("scale")+' Legal</button>';
        } else if (currentStatus === "LEGAL") {
          statusButtons = '<button class="btn sm gold" onclick="changeStatus(\''+id+'\',\'ACTIVE\')">▶ Reactivate</button>';
        }
        drawerActions += statusButtons;
        
        var sentDrafts=STATE.drafts.filter(function(x){
          return field(x,"invoice_id")===id && ["SENT","AUTO_SENT"].indexOf(field(x,"status"))>=0;
        }).sort(function(a,b){return String(field(b,"created_at")).localeCompare(String(field(a,"created_at")))});

        if (sentDrafts.length > 0 && field(i,"status") === "ACTIVE") {
          drawerActions += ' <button class="btn sm gold" onclick="simulateReplyForInvoice(\''+id+'\')">'+ic("chat")+' Simulate reply</button>';
        }
        
        var sentEmailsHtml = "";
        if (sentDrafts.length) {
          sentEmailsHtml = '<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:1.2rem 0 .5rem">All sent emails ('+sentDrafts.length+')</h2>'+
            sentDrafts.map(function(sd, idx){
              var method = field(sd,"status")==="AUTO_SENT"?"Auto-sent by AI":"Approved by human";
              return '<details style="margin-bottom:.5rem;border:1px solid var(--line);border-radius:8px;padding:.5rem;background:var(--card)" '+(idx===0?'open':'')+'>'+
                '<summary style="cursor:pointer;font-weight:600;font-size:.8rem;outline:none">'+
                  esc(field(sd,"subject"))+' <span style="font-weight:normal;font-size:.74rem;color:var(--muted)">('+dt(field(sd,"created_at"))+' · '+method+')</span>'+
                '</summary>'+
                '<div style="margin-top:.5rem;font-size:.82rem;line-height:1.55;border-top:1px solid var(--line);padding-top:.5rem;white-space:pre-wrap">'+
                  esc(field(sd,"body"))+
                '</div>'+
              '</details>';
            }).join("");
        }

        var lc={
          REPLY_RECEIVED: {color: "--blue", label: "Inbound Reply"},
          STATUS_CHANGE: {color: "--purple", label: "Status Change"},
          PROMISE_MADE: {color: "--low", label: "Promise Recorded"},
          NOTE: {color: "--muted", label: "Internal Note"},
          EMAIL_SENT: {color: "--low", label: "Email Sent"},
          STATUS_CHANGED: {color: "--purple", label: "Status Update"},
          AUTO_SENT: {color: "--low", label: "Auto-sent Email"},
          SENT: {color: "--low", label: "Approved Email"}
        };
        var renderTimeline = function(evs){
          return evs.length ? evs.map(function(e){
            var k = field(e,"kind")||"";
            var cfg = lc[k] || {color: "--gold", label: k.replace(/_/g," ")};
            return '<div class="ev"><span class="dot" style="background:var('+cfg.color+')"></span><div class="when">'+dt(field(e,"created_at"))+' · <b>'+esc(cfg.label)+'</b></div><div class="what">'+esc(field(e,"summary")||"")+'</div></div>';
          }).join("") : '<div class="muted">No history yet.</div>';
        };

        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">'+esc(field(i,"invoice_no"))+'</div><h1 style="font-size:1.3rem">'+esc(field(c,"name")||"")+(field(c,"vip")?' <span style="color:var(--gold)">★ VIP</span>':'')+'</h1></div><button class="x" onclick="closeDrawer()">×</button></div><div class="db"><div class="kv"><span class="k">Amount</span><span class="num">'+money(field(i,"amount"),field(i,"currency"))+'</span><span class="k">Due</span><span>'+String(field(i,"due_date")||"").slice(0,10)+' · '+(Number(field(i,"days_overdue")||0))+'d overdue</span><span class="k">Stage</span><span>'+stageChip(field(i,"stage"))+' '+riskChip(field(i,"risk_level"))+'</span><span class="k">Status</span><span>'+statusChip(field(i,"status"))+'</span><span class="k">Follow-ups</span><span>'+(field(i,"followup_count")||0)+'</span>'+(field(c,"email")?'<span class="k">Email</span><span class="muted">'+esc(field(c,"email"))+'</span>':"")+'</div><div style="display:flex;gap:.4rem;margin-bottom:.8rem;flex-wrap:wrap">'+drawerActions+'</div><h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:.2rem 0 .5rem">Latest draft</h2>'+mailHtml+acts+sentEmailsHtml+'<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:1.2rem 0 .3rem">History</h2><div class="timeline">'+renderTimeline(evs)+'</div></div>';openDrawerEl()};
      window.approveEdited=function(id){var t=$("edit_body");var b=t?t.value:null;action(b?{action:"approve",draft_id:id,edited_body:b}:{action:"approve",draft_id:id},"Approved & sent");closeDrawer()};
      window.openCustomer=function(cid){var c=clientOf(cid);var invs=invoicesForClient(cid);var evs=STATE.interactions.filter(function(e){return field(e,"client_id")===cid}).slice(0,12);var out=invs.filter(function(i){return field(i,"status")==="ACTIVE"}).reduce(function(a,i){return a+Number(field(i,"amount")||0)},0);
        var lc={
          REPLY_RECEIVED: {color: "--blue", label: "Inbound Reply"},
          STATUS_CHANGE: {color: "--purple", label: "Status Change"},
          PROMISE_MADE: {color: "--low", label: "Promise Recorded"},
          NOTE: {color: "--muted", label: "Internal Note"},
          EMAIL_SENT: {color: "--low", label: "Email Sent"},
          STATUS_CHANGED: {color: "--purple", label: "Status Update"},
          AUTO_SENT: {color: "--low", label: "Auto-sent Email"},
          SENT: {color: "--low", label: "Approved Email"}
        };
        var renderTimeline = function(evs){
          return evs.length ? evs.map(function(e){
            var k = field(e,"kind")||"";
            var cfg = lc[k] || {color: "--gold", label: k.replace(/_/g," ")};
            return '<div class="ev"><span class="dot" style="background:var('+cfg.color+')"></span><div class="when">'+dt(field(e,"created_at"))+' · <b>'+esc(cfg.label)+'</b></div><div class="what">'+esc(field(e,"summary")||"")+'</div></div>';
          }).join("") : '<div class="muted">No history yet.</div>';
        };
        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">Customer</div><h1 style="font-size:1.3rem">'+esc(field(c,"name"))+(field(c,"vip")?' <span style="color:var(--gold)">★</span>':'')+'</h1></div><button class="x" onclick="closeDrawer()">×</button></div><div class="db"><div class="kv"><span class="k">Email</span><span class="muted">'+esc(field(c,"email"))+'</span><span class="k">Outstanding</span><span class="num">'+money(out)+'</span><span class="k">Behavior</span><span>'+esc(field(c,"payment_behavior")||"AVERAGE")+'</span>'+(field(c,"notes")?'<span class="k">Notes</span><span>'+esc(field(c,"notes"))+'</span>':"")+'</div>'+
          '<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:.2rem 0 .5rem">Invoices ('+invs.length+')</h2><table><tbody>'+invs.map(function(i){return '<tr class="clickable" onclick="openInvoice(\''+field(i,"id")+'\')"><td><b>'+esc(field(i,"invoice_no"))+'</b></td><td class="num">'+money(field(i,"amount"),field(i,"currency"))+'</td><td>'+stageChip(field(i,"stage"))+'</td><td>'+statusChip(field(i,"status"))+'</td></tr>'}).join("")+'</tbody></table>'+
          '<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:1.1rem 0 .3rem">Relationship history</h2><div class="timeline">'+renderTimeline(evs)+'</div></div>';openDrawerEl()};

      window.seedWithCount=async function(count){
        setBusy(true,"Seeding "+count+" customers & invoices…");
        try{
          await invokeFn("seed_demo",{enqueue:true, count:count});
          await loadData();
          render(true);
          toast("Demo data seeded with "+count+" invoices");
        }catch(e){
          toast("⚠ "+e.message);
        }
        setBusy(false);
      };

      window.simulateReplyForInvoice=function(invId){
        closeDrawer();
        var i=invoiceOf(invId);
        var c=clientOf(field(i,"client_id"));
        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">Simulate Reply</div><h1 style="font-size:1.3rem">Simulate reply from '+esc(field(c,"name")||"customer")+'</h1></div><button class="x" onclick="closeDrawer()">×</button></div><div class="db"><p class="muted" style="font-size:.82rem">Enter reply text representing what this customer wrote back. The AI will classify it (promise / dispute / paid / question) and take the correct side effects.</p><label class="fld"><span class="lbl">Invoice</span><input type="text" id="lr_inv_display" value="'+esc(field(i,"invoice_no"))+'" disabled style="opacity:0.7"><input type="hidden" id="lr_inv" value="'+invId+'"></label><label class="fld"><span class="lbl">Reply text</span><textarea id="lr_body" placeholder="e.g. Apologies for the delay — we will pay by Friday."></textarea></label><div style="margin-top:1rem;display:flex;gap:.5rem"><button class="btn gold" onclick="submitReply()">Process reply</button><button class="btn sm ghost" onclick="openInvoice(\''+invId+'\')">Back to invoice</button></div></div>';
        openDrawerEl();
      };
    </script>
  </body>
</html>

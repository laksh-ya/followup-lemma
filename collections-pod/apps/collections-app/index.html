<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Collections Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
      /* Geist / Vercel design system. Variable names kept stable so inline styles keep working. */
      :root{color-scheme:light;
        --paper:#fafafa;--card:#ffffff;--card2:#fafafa;--ink:#171717;--muted:#666666;--faint:#8f8f8f;
        --line:rgba(0,0,0,.10);--line2:rgba(0,0,0,.06);
        --accent:#006bff;--accent-ink:#ffffff;--accent-soft:rgba(0,107,255,.10);
        --primary:#171717;--primary-ink:#ffffff;
        --chip:#f1f1f0;--low:#15803d;--med:#b45309;--high:#c81e1e;--blue:#1d4ed8;--purple:#334155;
        --sans:"Hanken Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--mono:"Geist Mono",ui-monospace,"SF Mono",Menlo,monospace;
        --shadow:0 1px 2px rgba(0,0,0,.04);--shadow-lg:0 8px 30px rgba(0,0,0,.12);
        --serif:var(--sans);--gold:var(--accent);--glow:var(--card2);--accent-ink2:var(--accent-ink);}
      [data-theme="dark"]{color-scheme:dark;
        --paper:#0a0a0a;--card:#111111;--card2:#181818;--ink:#ededed;--muted:#a1a1a1;--faint:#707070;
        --line:rgba(255,255,255,.13);--line2:rgba(255,255,255,.07);
        --accent:#3b9eff;--accent-ink:#001227;--accent-soft:rgba(59,158,255,.14);
        --primary:#ededed;--primary-ink:#0a0a0a;
        --chip:#1f1f1f;--low:#3fb950;--med:#d29922;--high:#ff6166;--blue:#5b8def;--purple:#94a3b8;
        --shadow:0 1px 2px rgba(0,0,0,.4);--shadow-lg:0 12px 40px rgba(0,0,0,.6);}
      *{box-sizing:border-box}
      body{margin:0;min-height:100dvh;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
      ::selection{background:var(--accent-soft)}
      a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
      :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
      .wrap{max-width:1180px;margin:0 auto;padding:clamp(1rem,3vw,2rem)}
      svg.ic{width:1em;height:1em;display:inline-block;vertical-align:-.14em;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
      .top{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
      .brand{display:flex;align-items:center;gap:.7rem}
      .brand .logo{width:36px;height:36px;border-radius:9px;background:var(--primary);color:var(--primary-ink);display:grid;place-items:center;font-size:1.05rem}
      .eyebrow{font-size:.8rem;color:var(--muted);font-weight:400}
      h1{font-weight:700;font-size:clamp(1.2rem,2.4vw,1.45rem);letter-spacing:-.025em;margin:0;line-height:1.1}
      .pill{display:inline-flex;align-items:center;gap:.4rem;font-size:.74rem;font-weight:500;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:.3rem .65rem}
      .pip{width:7px;height:7px;border-radius:50%;background:var(--low);box-shadow:0 0 0 3px color-mix(in srgb,var(--low) 20%,transparent)}
      .btn{display:inline-flex;align-items:center;gap:.4rem;font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:7px;padding:.5rem .85rem;font-weight:500;font-size:.88rem;transition:.14s;white-space:nowrap;height:36px}
      .btn:hover{background:var(--card2);border-color:color-mix(in srgb,var(--ink) 22%,var(--line))}
      .btn.gold{background:var(--primary);border-color:var(--primary);color:var(--primary-ink)} .btn.gold:hover{background:color-mix(in srgb,var(--primary) 85%,var(--paper));border-color:transparent}
      .btn.sm{padding:.36rem .62rem;font-size:.83rem;height:32px} .btn.ghost{background:none;border-color:transparent} .btn.ghost:hover{background:var(--chip);border-color:transparent}
      .btn.danger{color:var(--high)} .btn.danger:hover{border-color:color-mix(in srgb,var(--high) 45%,var(--line));background:color-mix(in srgb,var(--high) 8%,transparent)}
      .btn.good{color:var(--low)} .btn.good:hover{border-color:color-mix(in srgb,var(--low) 45%,var(--line));background:color-mix(in srgb,var(--low) 9%,transparent)}
      .btn:disabled{opacity:.45;cursor:default}
      .iconbtn{display:inline-grid;place-items:center;width:34px;height:34px;padding:0;font-size:1rem;color:var(--muted)}
      .iconbtn:hover{color:var(--ink)} .iconbtn.on{background:var(--chip);color:var(--ink);border-color:var(--line)}
      .menu{position:relative;display:inline-block}
      .menu .items{position:absolute;right:0;top:calc(100% + 6px);background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);padding:.35rem;min-width:230px;z-index:20;display:none}
      .menu.open .items{display:block}
      .menu .items button{display:flex;align-items:center;gap:.6rem;width:100%;text-align:left;font:inherit;font-weight:400;font-size:.85rem;background:none;border:none;color:var(--ink);padding:.5rem .55rem;border-radius:7px;cursor:pointer}
      .menu .items button:hover{background:var(--chip)} .menu .items button svg.ic{color:var(--faint)} .menu .items hr{border:none;border-top:1px solid var(--line2);margin:.3rem 0}
      .tabs{display:flex;gap:.1rem;flex-wrap:wrap;margin:1.4rem 0 .2rem;border-bottom:1px solid var(--line)}
      .tabs button{display:inline-flex;align-items:center;gap:.45rem;font:inherit;font-size:.94rem;font-weight:500;cursor:pointer;border:none;background:none;color:var(--muted);padding:.65rem .9rem;position:relative}
      .tabs button svg.ic{opacity:.75;font-size:.95rem}
      .tabs button:hover{color:var(--ink)}
      .tabs button.on{color:var(--ink)} .tabs button.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--ink)}
      .tabs .badge{display:inline-block;min-width:17px;text-align:center;font-size:.66rem;font-weight:600;background:var(--chip);border-radius:999px;padding:.05rem .38rem;color:var(--muted)}
      .tabs button.on .badge{background:var(--ink);color:var(--paper)}
      .tabs .badge.hot{background:var(--high);color:#fff}
      .subnav{display:flex;gap:.3rem;flex-wrap:wrap;margin:1.1rem 0 1.2rem}
      .subnav button{font:inherit;font-size:.9rem;font-weight:500;cursor:pointer;border:1px solid transparent;background:none;color:var(--muted);padding:.45rem .9rem;border-radius:999px}
      .subnav button:hover{color:var(--ink);background:var(--chip)} .subnav button.on{background:var(--ink);color:var(--paper)}
      .subnav .grow{flex:1}
      .usecase{display:none}
      .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.7rem;margin-bottom:1.1rem}
      .stat{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:.9rem 1rem}
      .stat .n{font-size:1.9rem;font-weight:700;line-height:1;letter-spacing:-.03em} .stat .l{font-size:.8rem;color:var(--muted);margin-top:.5rem}
      .panel{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:1.15rem 1.3rem;margin-bottom:1.1rem}
      .panel h2{font-weight:600;font-size:1.05rem;letter-spacing:-.015em;margin:0 0 .9rem;display:flex;align-items:center;gap:.5rem} .panel h2 svg.ic{color:var(--faint);font-size:1.05rem}
      table{width:100%;border-collapse:collapse;font-size:.9rem} th{text-align:left;font-size:.74rem;font-weight:500;color:var(--faint);padding:.55rem .6rem;border-bottom:1px solid var(--line)}
      td{padding:.7rem .6rem;border-bottom:1px solid var(--line2);vertical-align:middle}
      tbody tr:last-child td{border-bottom:none}
      tr.clickable{cursor:pointer;transition:background .1s} tr.clickable:hover td{background:var(--card2)}
      .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
      .chip{display:inline-flex;align-items:center;gap:.25rem;font-size:.7rem;font-weight:500;padding:.14rem .5rem;border-radius:999px;white-space:nowrap;line-height:1.3;border:1px solid transparent}
      .muted{color:var(--muted)} .row-actions{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center}
      .empty{text-align:center;color:var(--muted);padding:2.6rem 1rem} .empty .big{font-size:1.1rem;font-weight:600;color:var(--ink);margin-bottom:.35rem;letter-spacing:-.01em}
      .empty svg.ic{font-size:1.8rem;color:var(--line);margin-bottom:.5rem;stroke-width:1.5}
      .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.2s;z-index:40} .scrim.on{opacity:1;pointer-events:auto}
      .drawer{position:fixed;top:0;right:0;height:100dvh;width:min(600px,96vw);background:var(--paper);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:50;overflow-y:auto} .drawer.on{transform:none}
      .drawer .dh{position:sticky;top:0;background:color-mix(in srgb,var(--paper) 90%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:1rem 1.2rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;z-index:2} .drawer .db{padding:1.1rem 1.2rem}
      .x{display:grid;place-items:center;width:32px;height:32px;font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);border-radius:7px;font-size:1rem;color:var(--muted);line-height:1} .x:hover{color:var(--ink)}
      .kv{display:grid;grid-template-columns:auto 1fr;gap:.5rem 1rem;font-size:.85rem;margin:.4rem 0 1rem} .kv .k{color:var(--muted)}
      .mail{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:.95rem 1.05rem;white-space:pre-wrap;font-size:.86rem;line-height:1.65} .mail .subj{font-weight:600;margin-bottom:.5rem;font-size:.95rem}
      .timeline{margin:.3rem 0 0} .timeline .ev{display:grid;grid-template-columns:16px 1fr;gap:.6rem;padding:.3rem 0} .timeline .ev .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);margin:.35rem auto 0;position:relative} .timeline .ev .dot::after{content:"";position:absolute;left:50%;top:12px;transform:translateX(-50%);width:1px;height:calc(100% + .6rem);background:var(--line2)} .timeline .ev:last-child .dot::after{display:none} .timeline .ev .when{font-size:.72rem;color:var(--faint);font-variant-numeric:tabular-nums} .timeline .ev .what{font-size:.85rem;margin-top:.05rem}
      textarea,input,select{font:inherit;font-size:.85rem;width:100%;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:.5rem .65rem;transition:.12s} textarea:focus,input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
      textarea{min-height:120px;resize:vertical;line-height:1.55}
      label.fld{display:block;margin:.75rem 0} label.fld .lbl{font-size:.76rem;font-weight:500;color:var(--muted);margin-bottom:.3rem;display:block}
      .toggle{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.7rem 0;border-bottom:1px solid var(--line2);font-size:.87rem} .toggle:last-child{border-bottom:none} .toggle b{font-weight:500}
      .sw{position:relative;display:inline-block;width:40px;height:23px;flex:none;cursor:pointer} .sw input{opacity:0;width:0;height:0} .sw .tk{position:absolute;inset:0;background:var(--line);border-radius:999px;transition:.16s} .sw .tk::before{content:"";position:absolute;top:2.5px;left:2.5px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.16s;box-shadow:0 1px 2px rgba(0,0,0,.25)} .sw input:checked+.tk{background:var(--accent)} .sw input:checked+.tk::before{transform:translateX(17px)}
      .grid2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem} @media(max-width:680px){.grid2{grid-template-columns:1fr}}
      .guide{background:var(--card2);border:1px solid var(--line2);border-radius:8px;padding:.8rem .9rem;font-size:.8rem;line-height:1.65;margin-top:.5rem;color:var(--muted)} .guide code{font-family:var(--mono);font-size:.9em;background:var(--chip);color:var(--ink);padding:.1rem .35rem;border-radius:5px} .guide ol{margin:.3rem 0 0 1rem;padding:0}
      .center{min-height:80dvh;display:grid;place-items:center;text-align:center}
      .toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(2rem);background:var(--ink);color:var(--paper);padding:.65rem 1.1rem;border-radius:8px;font-size:.84rem;font-weight:500;opacity:0;transition:.24s;z-index:120;box-shadow:var(--shadow-lg)} .toast.on{opacity:1;transform:translateX(-50%)}
      .busy{position:fixed;inset:0;background:color-mix(in srgb,var(--paper) 70%,transparent);backdrop-filter:blur(4px);display:none;place-items:center;z-index:110} .busy.on{display:grid}
      .busy .box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:1.5rem 1.8rem;text-align:center;min-width:240px;box-shadow:var(--shadow-lg)}
      .busy .box p{margin:.9rem 0 0;font-weight:500;font-size:.9rem} .busy .box .sub{margin-top:.25rem;font-weight:400;font-size:.78rem;color:var(--muted)}
      .spin{display:inline-block;width:26px;height:26px;border:2.5px solid var(--line);border-top-color:var(--ink);border-radius:50%;animation:sp .7s linear infinite} @keyframes sp{to{transform:rotate(360deg)}}
      .dots span{display:inline-block;width:6px;height:6px;margin:0 2px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite both} .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s} @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
      .working{display:flex;align-items:center;gap:.55rem;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:.6rem .85rem;margin-bottom:1rem;font-size:.84rem}
      .skel{background:linear-gradient(90deg,var(--chip) 25%,color-mix(in srgb,var(--chip) 50%,var(--card)) 50%,var(--chip) 75%);background-size:200% 100%;animation:shim 1.3s infinite;border-radius:5px} @keyframes shim{to{background-position:-200% 0}}
      .hero{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:1.4rem;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:1.4rem 1.6rem;margin-bottom:1rem}
      .hero .big{font-size:clamp(2rem,5vw,2.9rem);font-weight:600;line-height:1;letter-spacing:-.035em}
      .hero .sub{font-size:.8rem;color:var(--muted);margin-top:.55rem}
      .hero .minis{display:flex;gap:1.8rem}
      .hero .mini .n{font-size:1.5rem;line-height:1;font-weight:600;letter-spacing:-.02em}
      .hero .mini .l{font-size:.7rem;color:var(--muted);margin-top:.4rem}
      .needs{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.7rem;margin-bottom:1rem}
      .acard{cursor:pointer;text-align:left;font:inherit;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:1rem 1.05rem;transition:.14s;position:relative}
      .acard:hover{border-color:color-mix(in srgb,var(--ink) 25%,var(--line));transform:translateY(-1px)}
      .acard .acn{font-size:1.7rem;line-height:1;font-weight:600;color:var(--ac,var(--ink));letter-spacing:-.03em}
      .acard .acl{font-weight:500;font-size:.86rem;margin-top:.4rem;display:flex;align-items:center;gap:.4rem} .acard .acl svg.ic{color:var(--ac,var(--faint))}
      .acard .acs{font-size:.75rem;color:var(--muted);margin-top:.2rem}
      .allclear{display:flex;align-items:center;gap:.7rem;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:1rem 1.15rem;margin-bottom:1rem;font-size:.87rem} .allclear svg.ic{color:var(--low);font-size:1.2rem}
      .split{display:grid;grid-template-columns:1fr 1fr;gap:1rem}@media(max-width:760px){.split{grid-template-columns:1fr}}
      .seg{display:inline-flex;background:var(--chip);border-radius:8px;padding:3px;gap:2px} .seg button{border:none;background:none;font:inherit;font-weight:500;font-size:.8rem;color:var(--muted);padding:.35rem .7rem;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:.35rem} .seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
      .conn{display:inline-flex;align-items:center;gap:.35rem;font-size:.72rem;font-weight:500;padding:.2rem .5rem;border-radius:999px} .conn.ok{background:color-mix(in srgb,var(--low) 12%,transparent);color:var(--low)} .conn.no{background:var(--chip);color:var(--muted)}
      /* onboarding modal */
      .modal{position:fixed;inset:0;display:none;place-items:center;z-index:130;padding:1rem} .modal.on{display:grid}
      .modal .mcard{background:var(--card);border:1px solid var(--line);border-radius:14px;max-width:520px;width:100%;padding:1.6rem 1.7rem;box-shadow:var(--shadow-lg);animation:pop .2s ease}
      @keyframes pop{from{opacity:0;transform:scale(.97) translateY(6px)}to{opacity:1;transform:none}}
      .modal h2{font-size:1.3rem;font-weight:600;letter-spacing:-.02em;margin:.2rem 0 .3rem}
      .step{display:flex;gap:.8rem;padding:.65rem 0;border-top:1px solid var(--line2)} .step .si{flex:none;width:30px;height:30px;border-radius:7px;background:var(--chip);color:var(--ink);display:grid;place-items:center} .step .st{font-weight:500;font-size:.88rem} .step .sd{font-size:.8rem;color:var(--muted);margin-top:.1rem}
      /* bottom-docked assistant */
      .askbtn{position:fixed;right:1.4rem;bottom:1.4rem;height:48px;padding:0 1.05rem;gap:.5rem;border-radius:999px;background:var(--primary);color:var(--primary-ink);border:none;display:inline-flex;align-items:center;font:inherit;font-weight:500;font-size:.86rem;cursor:pointer;box-shadow:var(--shadow-lg);z-index:70;transition:.15s} .askbtn:hover{transform:translateY(-1px)} .askbtn svg.ic{font-size:1.05rem}
      .askpanel{position:fixed;right:1.4rem;bottom:1.4rem;width:min(400px,calc(100vw - 2rem));height:min(620px,calc(100dvh - 2rem));background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);z-index:75;display:none;flex-direction:column;overflow:hidden} .askpanel.on{display:flex}
      .askpanel .ah{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1rem;border-bottom:1px solid var(--line)} .askpanel .ah .t{font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:.5rem} .askpanel .ab{flex:1;min-height:0;overflow:auto;background:var(--card)}
      .askpanel lemma-agent-thread{display:block;height:100%;--lemma-bg:var(--card);--lemma-fg:var(--ink);--lemma-text:var(--ink);--lemma-color:var(--ink);--lemma-muted:var(--muted);--lemma-border:var(--line);--lemma-accent:var(--accent);--lemma-radius:8px;color:var(--ink)}
      .askmsgs{flex:1;min-height:0;overflow:auto;padding:.9rem 1rem;display:flex;flex-direction:column;gap:.6rem}
      .askempty{font-size:.86rem;line-height:1.7;color:var(--muted);margin:auto 0}
      .amsg{max-width:88%;padding:.55rem .8rem;border-radius:13px;font-size:.9rem;line-height:1.55;word-wrap:break-word;overflow-wrap:anywhere}
      .amsg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
      .amsg.bot{align-self:flex-start;background:var(--chip);color:var(--ink);border-bottom-left-radius:4px}
      .amsg.bot strong{font-weight:700} .amsg.bot em{font-style:italic} .amsg.bot code{font-family:var(--mono);font-size:.86em;background:color-mix(in srgb,var(--ink) 8%,transparent);padding:.05rem .3rem;border-radius:4px} .amsg.bot ul{margin:.35rem 0;padding-left:1.15rem} .amsg.bot li{margin:.12rem 0} .amsg.bot a{color:var(--accent);text-decoration:underline}
      .athink{align-self:flex-start;color:var(--muted);font-size:.85rem;display:inline-flex;gap:.5rem;align-items:center;padding:.3rem .2rem}
      .acompose{display:flex;gap:.5rem;padding:.6rem;border-top:1px solid var(--line);background:var(--card)} .acompose input{flex:1} .acompose button{flex:none}
    </style>
  </head>
  <body>
    <div id="app"><div class="center"><div class="spin"></div></div></div>
    <div class="scrim" id="scrim" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer"></div>
    <div class="toast" id="toast"></div>
    <div class="busy" id="busy"><div class="box"><div class="spin"></div><p id="busymsg">Working…</p><p class="sub" id="busysub"></p></div></div>
    <div class="modal" id="onboard"></div>
    <button class="askbtn" id="askbtn" onclick="toggleAsk(true)" style="display:none"></button>
    <div class="askpanel" id="askpanel">
      <div class="ah"><div><div class="t"></div><div class="asub muted" style="font-size:.72rem;margin-top:.1rem"></div></div><button class="x" onclick="toggleAsk(false)">&times;</button></div>
      <div class="ab" id="askbody"></div>
    </div>
    <input type="file" id="csvfile" accept=".csv,.xlsx,.xls" style="display:none" />

    <script>

      var STAGE_C={PENDING:"--muted",STAGE_1:"--low",STAGE_2:"--med",STAGE_3:"--med",STAGE_4:"--high",ESCALATED:"--purple"};

      function stageChip(s){return chip((s||"").replace("STAGE_","S"),STAGE_C[s]||"--muted")}

      async function boot(){applyTheme(theme());try{client=new window.LemmaClient.LemmaClient();var a=await client.initialize();if(a.status!=="authenticated")return signIn();ME=a.user||{};await loadData();render();subscribe();initAsk();maybeOnboard();}catch(e){fatal((e&&e.message)||"error")}}

      // ---- bottom-docked assistant (created once, survives re-renders & theme toggles)
      var ASK={conv:null,msgs:[],busy:false,custom:false};
      // tiny, safe markdown → HTML (escapes first). bold/italic/code/links/bullets/headings.
      function md(t){
        t=esc(String(t==null?"":t));
        t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
        t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
        t=t.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
        var lines=t.split(/\r?\n/),out=[],inList=false;
        lines.forEach(function(l){
          var m=l.match(/^\s*[-*•]\s+(.*)$/);
          if(m){if(!inList){out.push("<ul>");inList=true;}out.push("<li>"+m[1]+"</li>");return;}
          if(inList){out.push("</ul>");inList=false;}
          var h=l.match(/^\s*#{1,4}\s+(.*)$/);
          if(h){out.push("<strong>"+h[1]+"</strong>");return;}
          out.push(l);
        });
        if(inList)out.push("</ul>");
        return out.join("\n").replace(/\n(?!<\/?ul>|<li>)/g,"<br>").replace(/\n/g,"");
      }
      function initAsk(){
        var b=$("askbtn");b.innerHTML=ic("chat")+' Ask';b.style.display='inline-flex';
        $("askpanel").querySelector(".ah .t").innerHTML=ic("chat")+' Collections Concierge';
        $("askpanel").querySelector(".ah .asub").textContent='Ask about overdue accounts, the legal queue, or a customer.';
        try{ASK.custom=!!(client&&client.conversations&&client.conversations.create&&client.conversations.messages&&client.conversations.messages.list&&client.conversations.sendMessageStream)}catch(e){ASK.custom=false}
        var body=$("askbody");
        if(ASK.custom){
          body.style.cssText="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;background:var(--card)";
          body.innerHTML='<div id="askmsgs" class="askmsgs"></div><form class="acompose" onsubmit="askSend(event)"><input id="askinput" placeholder="Ask about the book…" autocomplete="off"><button class="btn gold sm" type="submit" title="Send">'+ic("send")+'</button></form>';
          renderAskMsgs();
        } else if(!body.querySelector("lemma-agent-thread")){
          body.innerHTML='<lemma-agent-thread agent="collections-concierge"></lemma-agent-thread>';
        }
        try{if(sessionStorage.getItem("ca-ask")==="1")toggleAsk(true)}catch(e){}
      }
      function renderAskMsgs(scroll){
        var box=$("askmsgs");if(!box)return;
        var html=ASK.msgs.length?ASK.msgs.map(function(m){return m.role==="user"?'<div class="amsg user">'+esc(m.text)+'</div>':'<div class="amsg bot">'+md(m.text)+'</div>'}).join("")
          :'<div class="askempty">Hi — I\'m the <b>Collections Concierge</b>. Try:<br>• biggest overdue accounts<br>• what\'s in the legal queue?<br>• what\'s waiting for approval?<br>• what\'s going on with a customer?</div>';
        if(ASK.busy)html+='<div class="athink"><span class="dots"><span></span><span></span><span></span></span> thinking…</div>';
        box.innerHTML=html;box.scrollTop=box.scrollHeight;
      }
      window.askSend=async function(e){
        if(e&&e.preventDefault)e.preventDefault();
        var inp=$("askinput");if(!inp||ASK.busy)return;var q=inp.value.trim();if(!q)return;inp.value="";
        ASK.msgs.push({role:"user",text:q});ASK.busy=true;renderAskMsgs(true);
        try{
          if(!ASK.conv){var c=await client.conversations.create({agent_name:"collections-concierge"});ASK.conv=(c&&(c.id||c.conversation_id||(c.data&&c.data.id)))||c;}
          var cid=ASK.conv;
          var s=await client.conversations.sendMessageStream(cid,{content:q});
          if(s&&typeof s[Symbol.asyncIterator]==="function"){try{for await(var _ of s){}}catch(se){}}
          var ans=await _askPoll(cid);
          ASK.busy=false;ASK.msgs.push({role:"bot",text:ans||"(no answer)"});renderAskMsgs(true);
        }catch(err){
          // API shape unexpected — fall back to the proven component and forward the question
          ASK.busy=false;ASK.custom=false;
          var body=$("askbody");body.style.cssText="";body.innerHTML='<lemma-agent-thread agent="collections-concierge"></lemma-agent-thread>';
          var el=body.querySelector("lemma-agent-thread");setTimeout(function(){try{el.send&&el.send(q)}catch(e2){}},350);
        }
      };
      async function _askPoll(cid){
        for(var i=0;i<24;i++){
          await new Promise(function(r){setTimeout(r,1400)});
          try{
            var r=await client.conversations.messages.list(cid);var items=listOf(r);
            var finals=items.filter(function(m){var role=field(m,"role");var meta=field(m,"metadata")||{};return role==="assistant"&&(meta.is_final_answer||field(m,"kind")==="text"||field(m,"kind")==="TEXT");});
            if(finals.length){var last=finals[finals.length-1];var txt=field(last,"text")||field(last,"content")||"";if(txt&&String(txt).trim())return String(txt);}
          }catch(e){}
        }
        return "The assistant is taking longer than usual — please try again.";
      }
      window.toggleAsk=function(open){
        var p=$("askpanel"),b=$("askbtn");
        var show=(open===undefined)?!p.classList.contains("on"):open;
        p.classList.toggle("on",show);b.style.display=show?"none":"inline-flex";
        try{sessionStorage.setItem("ca-ask",show?"1":"0")}catch(e){}
      };
      // ---- onboarding
      function maybeOnboard(){try{if(!localStorage.getItem("ca-onboarded"))openOnboarding()}catch(e){}}
      window.openOnboarding=function(){
        function step(n,t,d){return '<div class="step"><div class="si">'+n+'</div><div><div class="st">'+t+'</div><div class="sd">'+d+'</div></div></div>'}
        $("onboard").innerHTML='<div class="mcard"><div class="eyebrow">Welcome</div><h2>Your AI collections desk</h2>'+
          '<p class="muted" style="font-size:.88rem;margin:.2rem 0 1rem;line-height:1.55">This agent chases overdue invoices for you — it drafts the right follow-up for each account, sends the safe ones automatically, and hands the sensitive ones to you.</p>'+
          step(1,"Load your invoices","Data → Import from Google Sheets or CSV.")+
          step(2,"The agent works the queue","It drafts and auto-sends low-risk follow-ups; risky ones wait in Approvals for you.")+
          step(3,"Escalate &amp; track","Send an account to Legal (posts to Slack #legal); replies are read and classified automatically.")+
          step(4,"Stay informed","A daily digest goes to Slack &amp; Telegram, and you can ask the assistant anything, anytime.")+

        $("onboard").onclick=function(e){if(e.target===$("onboard"))closeOnboarding()};
      };

      function signIn(){$("app").innerHTML='<div class="center"><div><div class="eyebrow">Collections Agent</div><h1>Welcome.</h1><p class="muted" style="margin:.6rem 0 1rem">Sign in to open the desk.</p><button class="btn gold" id="si">Sign in</button></div></div>';$("si").onclick=function(){client.auth.redirectToAuth()}}

      async function loadData(){
        var r=await Promise.all([client.records.list("clients",{limit:1000}),client.records.list("invoices",{limit:1000}),client.records.list("drafts",{limit:2000}),client.records.list("interactions",{limit:400,sort:[{field:"created_at",direction:"desc"}]}),client.records.list("promises",{limit:500}),client.records.list("pod_config",{limit:1}),client.records.list("followup_queue",{limit:1000}),client.records.list("stats_channels",{limit:20})]);
        STATE.clients=listOf(r[0]);STATE.invoices=listOf(r[1]);STATE.drafts=listOf(r[2]);STATE.interactions=listOf(r[3]);STATE.promises=listOf(r[4]);STATE.config=listOf(r[5])[0]||{};STATE.queue=listOf(r[6]);STATE.statsChannels=listOf(r[7]);
      }
      // One shared workspace — every invoice/draft/reply is real and shown across the tabs.
      // (These pass-throughs keep older call-sites working after the Mock Mailbox was removed.)
      function isDemoId(){return false}
      function mainInvoices(){return STATE.invoices}
      function realDrafts(){return STATE.drafts}
      function clientHasReal(cid){return invoicesForClient(cid).length>0}
      function statsChan(ch){return STATE.statsChannels.find(function(r){return String(field(r,"channel")).toUpperCase()===ch})||{}}
      function clientOf(id){return STATE.clients.find(function(c){return field(c,"id")===id})||{}}
      function invoiceOf(id){return STATE.invoices.find(function(i){return field(i,"id")===id})||{}}
      function invoicesForClient(cid){return STATE.invoices.filter(function(i){return field(i,"client_id")===cid})}
      function latestDraft(invId,st){var ds=STATE.drafts.filter(function(d){return field(d,"invoice_id")===invId&&(!st||st.indexOf(field(d,"status"))>=0)});ds.sort(function(a,b){return String(field(b,"created_at")).localeCompare(String(field(a,"created_at")))});return ds[0]}
      function pendingDrafts(){return STATE.drafts.filter(function(d){return field(d,"status")==="PENDING_REVIEW"})}
      function pendingReal(){return pendingDrafts().filter(function(d){return !isDemoId(field(d,"invoice_id"))})}
      function replies(){return STATE.interactions.filter(function(e){return field(e,"kind")==="REPLY_RECEIVED"})}
      function repliesReal(){return replies().filter(function(e){return !isDemoId(field(e,"invoice_id"))})}
      function processingCount(){return (STATE.queue||[]).filter(function(q){return ["QUEUED","PROCESSING"].indexOf(field(q,"status"))>=0}).length}

      var _t=null;function subscribe(){try{if(client.datastore&&client.datastore.watchChanges){client.datastore.watchChanges({onChange:function(){clearTimeout(_t);_t=setTimeout(async function(){await loadData();if(TAB!=="ask")render(true)},800)}})}}catch(e){}}

      // Run a pod function through the SDK so auth (bearer OR cookie session) is handled
      // correctly on local AND cloud. The old raw-fetch path used localStorage["lemma_token"],
      // which is empty under a cloud cookie session — that broke every write action.
      async function invokeFn(name,input){
        if(client&&client.functions&&client.functions.run){
          var r=await client.functions.run(name,{input:input||{}});
          if(r==null)return r;
          return (r.output_data!=null)?r.output_data:((r.outputData!=null)?r.outputData:r);
        }
        var cfg=window.__LEMMA_CONFIG__||{};var base=(cfg.apiUrl||location.origin).replace(/\/$/,"");var tok="";try{tok=localStorage.getItem("lemma_token")||""}catch(e){}
        var res=await fetch(base+"/pods/"+cfg.podId+"/functions/"+name+"/runs",{method:"POST",headers:{"Authorization":"Bearer "+tok,"Content-Type":"application/json"},body:JSON.stringify({input_data:input})});
        if(!res.ok)throw new Error(name+" failed ("+res.status+")");return (await res.json()).output_data;
      }
      async function action(input,msg){
        var bm={approve:["Sending follow-up…","Delivering the email and updating the account"],flag:["Escalating to legal…","Posting to Slack #legal"],reject:["Updating draft…",""],change_status:["Updating invoice…",""],notify:["Posting to Slack…",""]}[input.action]||["Working…",""];
        setBusy(true,bm[0],bm[1]);
        try{var o=await invokeFn("app_action",input);await loadData();render(true);setBusy(false);toast(msg||(o&&o.detail)||"Done");return o}
        catch(e){setBusy(false);toast("⚠ "+(e.message||"failed"))}
      }
      window.doScan=async function(){setBusy(true,"Scanning overdue invoices…");try{await invokeFn("app_action",{action:"scan"});await loadData();render(true);toast("Scan started — the agent is drafting follow-ups")}catch(e){toast("⚠ "+e.message)}setBusy(false)};
      window.doProcess=function(id){action({action:"process",invoice_id:id},"Queued for the agent")};

      // ---- data tools
      window.seedDemo=async function(){
        var raw=prompt("How many invoices do you want to seed? (e.g. 10, 20, 50)", "20");
        if(raw===null)return;
        var count=parseInt(raw,10);
        var payload={enqueue:true};
        if(!isNaN(count) && count>0) payload.count=count;
        setBusy(true,"Seeding "+(payload.count||"demo")+" customers & invoices…");

          sec("hash","Slack — #legal &amp; #daily-stats posts",'One connector powers the legal escalations and the stats digest, pinned to a fixed workspace account.<ol><li><code>lemma connectors auth-configs create slack --name slack</code> → connect an account.</li><li>Invite the app to <b>#legal</b> and <b>#daily-stats</b>.</li><li>Wire the ids (admin, one-time): <code>save_config</code> → <code>slack_account_id</code>, <code>slack_legal_channel</code>; <code>save_stats_channel</code> → SLACK <code>destination</code> = #daily-stats id.</li></ol>')+

          sec("telegram","Telegram — chat &amp; stats digest",'<b>Chat</b> (no token): <code>lemma surfaces upsert telegram --agent collections-concierge</code> → <code>lemma surfaces setup telegram</code>, open the <b>t.me</b> link, message the bot.<br><br><b>Stats digest</b> needs a bot token (the connector has no send op): <b>@BotFather</b> ▸ <code>/newbot</code> ▸ store the token via <code>save_config</code> → <code>telegram_bot_token</code>, and the chat id via <code>save_stats_channel</code> → TELEGRAM <code>destination</code>.')+
          sec("clock","Automatic digest schedule",'The Schedule tab&rsquo;s day/time drives delivery; the sweep runs every 30 min once resumed: <code>lemma schedules resume stats-dispatch</code> (pause: <code>lemma schedules pause stats-dispatch</code>).')+
        '</div>';openDrawerEl();
      };

      // ---- AI insights / explainability
      window.openInsights=function(){closeMenu();
        var c=STATE.config;
        var drafts=realDrafts();
        var sentD=drafts.filter(function(d){return["SENT","AUTO_SENT"].indexOf(field(d,"status"))>=0});
        var auto=drafts.filter(function(d){return field(d,"status")==="AUTO_SENT"}).length;
        var human=drafts.filter(function(d){return field(d,"status")==="SENT"}).length;
        var pending=pendingReal().length;
        var fb=drafts.filter(function(d){return field(d,"fallback_used")}).length;
        var confs=drafts.map(function(d){return field(d,"confidence_score")}).filter(function(x){return x!=null});
        var avgConf=confs.length?Math.round(confs.reduce(function(a,b){return a+Number(b)},0)/confs.length*100):null;
        // Rough token estimate: output ≈ chars/4, plus ~650 prompt tokens/draft (system + policy + invoice context).
        var outTok=drafts.reduce(function(a,d){return a+Math.round(((field(d,"subject")||"").length+(field(d,"body")||"").length)/4)},0);
        var promptTok=drafts.length*650;
        var totalTok=outTok+promptTok;
        var estCost=(totalTok/1000000*0.30); // ~ $0.30 / 1M tokens (Llama-70B class)
        var autoPct=sentD.length?Math.round(auto/sentD.length*100):0;
        var lfOn=!!(field(c,"langfuse_public_key")&&field(c,"langfuse_secret_key"));
        function stat(n,l){return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'}
        var recent=drafts.slice(0,8).map(function(d){var i=invoiceOf(field(d,"invoice_id"));var conf=field(d,"confidence_score");var dec=field(d,"status")==="AUTO_SENT"?["Auto-sent","--low"]:field(d,"status")==="PENDING_REVIEW"?["Needs review","--med"]:field(d,"status")==="SENT"?["Human-approved","--blue"]:[field(d,"status")||"—","--muted"];
          return '<tr><td class="num">'+esc(field(i,"invoice_no")||"")+'</td><td>'+stageChip(field(i,"stage"))+'</td><td class="num">'+(conf!=null?Math.round(conf*100)+"%":"—")+'</td><td>'+chip(dec[0],dec[1])+'</td><td>'+(field(d,"fallback_used")?chip("template","--muted"):'<span class="muted">model</span>')+'</td></tr>'}).join("");
        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">Explainability</div><h1 style="font-size:1.3rem">AI insights</h1></div><button class="x" onclick="closeDrawer()">'+ic("x")+'</button></div><div class="db">'+
          '<p class="muted" style="font-size:.85rem;margin:.1rem 0 .9rem">How the agent has been deciding — and what it cost. Token figures are estimates from message size; connect Langfuse below for exact traces.</p>'+
          '<div class="stats">'+stat(sentD.length,"Follow-ups sent")+stat(autoPct+"%","Sent automatically")+stat(pending,"Held for review")+stat(avgConf!=null?avgConf+"%":"—","Avg confidence")+'</div>'+
          '<div class="stats">'+stat("~"+totalTok.toLocaleString(),"Est. tokens used")+stat("~$"+estCost.toFixed(3),"Est. cost")+stat(fb,"Template fallbacks")+stat(drafts.length,"Total drafts")+'</div>'+
          '<div class="panel" style="box-shadow:none;margin:.4rem 0 1rem"><h2>Recent decisions</h2><table><thead><tr><th>Invoice</th><th>Stage</th><th>Confidence</th><th>Decision</th><th>Source</th></tr></thead><tbody>'+(recent||'<tr><td colspan="5" class="empty">No drafts yet — run a scan.</td></tr>')+'</tbody></table></div>'+
          '<div class="panel" style="box-shadow:none"><h2>'+ic("external")+'Connect Langfuse '+(lfOn?'<span class="conn ok" style="margin-left:.4rem">'+ic("check")+'Connected</span>':'')+'</h2>'+
          '<p class="muted" style="font-size:.82rem;margin:.1rem 0 .5rem">Add your Langfuse keys to stream full LLM traces (exact tokens, latency, prompt/response) to your Langfuse project. Free tier at cloud.langfuse.com.</p>'+
          '<div class="grid2"><label class="fld"><span class="lbl">Public key</span><input id="cfg_langfuse_public_key" value="'+esc(field(c,"langfuse_public_key")||"")+'" placeholder="pk-lf-…"></label><label class="fld"><span class="lbl">Secret key</span><input id="cfg_langfuse_secret_key" value="'+esc(field(c,"langfuse_secret_key")||"")+'" placeholder="sk-lf-…"></label></div>'+
          '<label class="fld"><span class="lbl">Host</span><input id="cfg_langfuse_host" value="'+esc(field(c,"langfuse_host")||"https://cloud.langfuse.com")+'"></label>'+
          '<div style="margin-top:.5rem"><button class="btn gold sm" onclick="saveLangfuse()">'+ic("check")+' Save</button></div></div>'+
        '</div>';openDrawerEl();
      };
      window.saveLangfuse=function(){saveCfg(["langfuse_public_key","langfuse_secret_key","langfuse_host"],"Langfuse keys saved")};
      function openDrawerEl(){$("scrim").classList.add("on");$("drawer").classList.add("on")}
      window.closeDrawer=function(){$("scrim").classList.remove("on");$("drawer").classList.remove("on")};
      window.changeStatus=async function(id, status){
        if(!confirm("Are you sure you want to change the status of this invoice to "+status+"?"))return;
        setBusy(true,"Updating status…");
        try{
          await invokeFn("app_action",{action:"change_status",invoice_id:id,config:{status:status}});
          await loadData();
          render(true);
          openInvoice(id);
          toast("Status updated to "+status);
        }catch(e){
          toast("⚠ "+e.message);
        }
        setBusy(false);
      };
      window.exportSentCSV=function(){
        var rows=[["customer_name","customer_email","invoice_no","subject","body","stage","status","sent_at"]];
        var sent=STATE.drafts.filter(function(d){return ["SENT","AUTO_SENT"].indexOf(field(d,"status"))>=0});
        sent.forEach(function(d){
          var i=invoiceOf(field(d,"invoice_id")),c=clientOf(field(d,"client_id"));
          rows.push([
            field(c,"name"),
            field(c,"email"),
            field(i,"invoice_no"),
            field(d,"subject"),
            field(d,"body"),
            field(d,"stage"),
            field(d,"status"),
            field(d,"created_at")
          ]);
        });
        var csv=rows.map(function(r){return r.map(function(x){x=String(x==null?"":x);return /[",\n]/.test(x)?'"'+x.replace(/"/g,'""')+'"':x}).join(",")}).join("\n");
        var blob=new Blob([csv],{type:"text/csv"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="sent_emails_export.csv";a.click();toast("Exported "+sent.length+" sent emails");
      };
      window.openSentEmail=function(draftId){
        var d=STATE.drafts.find(function(x){return field(x,"id")===draftId});
        if(!d)return;
        var i=invoiceOf(field(d,"invoice_id")),c=clientOf(field(d,"client_id"));
        var method = field(d,"status")==="AUTO_SENT"?"Auto-sent by AI":"Approved by human reviewer";
        var confidence = field(d,"confidence_score") != null ? (Math.round(field(d,"confidence_score")*100)+"%") : "N/A";
        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">Sent Communication</div><h1 style="font-size:1.3rem">'+esc(field(c,"name")||"")+'</h1></div><button class="x" onclick="closeDrawer()">×</button></div>'+
          '<div class="db">'+
            '<div class="kv">'+
              '<span class="k">Invoice</span><span>'+esc(field(i,"invoice_no")||"")+'</span>'+
              '<span class="k">Stage</span><span>'+stageChip(field(d,"stage"))+'</span>'+
              '<span class="k">Method</span><span>'+chip(field(d,"status")==="AUTO_SENT"?"Auto-sent":"Approved",field(d,"status")==="AUTO_SENT"?"--blue":"--low")+' ('+method+')</span>'+
              '<span class="k">Confidence</span><span>'+confidence+'</span>'+
              '<span class="k">Sent At</span><span>'+dt(field(d,"created_at"))+'</span>'+
            '</div>'+
            '<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:1.2rem 0 .5rem">Email Content</h2>'+
            '<div class="mail"><div class="subj">'+esc(field(d,"subject"))+'</div>'+esc(field(d,"body"))+'</div>'+
            '<div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap">'+
              '<button class="btn sm" onclick="openInvoice(\''+field(d,"invoice_id")+'\')">View invoice</button>'+
              '<button class="btn sm gold" onclick="simulateReplyForInvoice(\''+field(d,"invoice_id")+'\')">'+ic("chat")+' Simulate reply</button>'+
              '<button class="btn sm ghost" onclick="closeDrawer()">Close</button>'+
            '</div>'+
          '</div>';
        openDrawerEl();
      };
      window.openInvoice=function(id){
        var i=invoiceOf(id),c=clientOf(field(i,"client_id"));
        var d=latestDraft(id,["PENDING_REVIEW","AUTO_SENT","SENT","FAILED","REJECTED"]);
        var evs=STATE.interactions.filter(function(e){return field(e,"invoice_id")===id});
        var pending=d&&field(d,"status")==="PENDING_REVIEW";
        var mailHtml=d?('<div class="mail"><div class="subj">'+esc(field(d,"subject"))+'</div>'+(pending?'<textarea id="edit_body">'+esc(field(d,"body"))+'</textarea>':esc(field(d,"body")))+'</div>'):'<div class="muted">No draft yet.</div>';
        var acts=pending?'<div class="row-actions" style="margin-top:.7rem"><button class="btn gold sm" onclick="approveEdited(\''+field(d,"id")+'\')">Approve &amp; send</button><button class="btn sm danger" onclick="reject(\''+field(d,"id")+'\');closeDrawer()">Reject</button><button class="btn sm danger" onclick="flag(\''+field(d,"id")+'\');closeDrawer()">Legal</button></div>':'';
        
        var drawerActions = "";
        if (field(i,"status") === "ACTIVE") {
          drawerActions += '<button class="btn sm" onclick="doProcess(\''+id+'\')">Process now</button> '+
            '<button class="btn sm" onclick="doProcess(\''+id+'\')">Regenerate</button> ';
        }
        
        var statusButtons = "";
        var currentStatus = field(i,"status");
        if (currentStatus === "ACTIVE") {
          statusButtons = '<button class="btn sm good" onclick="changeStatus(\''+id+'\',\'PAID\')">'+ic("check")+' Paid</button> '+
            '<button class="btn sm" onclick="changeStatus(\''+id+'\',\'PAUSED\')">⏸ Pause</button> '+
            '<button class="btn sm" onclick="changeStatus(\''+id+'\',\'DISPUTED\')">⚡ Dispute</button> '+
            '<button class="btn sm danger" onclick="changeStatus(\''+id+'\',\'LEGAL\')">'+ic("scale")+' Legal</button>';
        } else if (currentStatus === "PAUSED" || currentStatus === "DISPUTED") {
          statusButtons = '<button class="btn sm gold" onclick="changeStatus(\''+id+'\',\'ACTIVE\')">▶ Reactivate</button> '+
            '<button class="btn sm danger" onclick="changeStatus(\''+id+'\',\'LEGAL\')">'+ic("scale")+' Legal</button>';
        } else if (currentStatus === "LEGAL") {
          statusButtons = '<button class="btn sm gold" onclick="changeStatus(\''+id+'\',\'ACTIVE\')">▶ Reactivate</button>';
        }
        drawerActions += statusButtons;
        
        var sentDrafts=STATE.drafts.filter(function(x){
          return field(x,"invoice_id")===id && ["SENT","AUTO_SENT"].indexOf(field(x,"status"))>=0;
        }).sort(function(a,b){return String(field(b,"created_at")).localeCompare(String(field(a,"created_at")))});

        if (sentDrafts.length > 0 && field(i,"status") === "ACTIVE") {
          drawerActions += ' <button class="btn sm gold" onclick="simulateReplyForInvoice(\''+id+'\')">'+ic("chat")+' Simulate reply</button>';
        }
        
        var sentEmailsHtml = "";
        if (sentDrafts.length) {
          sentEmailsHtml = '<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:1.2rem 0 .5rem">All sent emails ('+sentDrafts.length+')</h2>'+
            sentDrafts.map(function(sd, idx){
              var method = field(sd,"status")==="AUTO_SENT"?"Auto-sent by AI":"Approved by human";
              return '<details style="margin-bottom:.5rem;border:1px solid var(--line);border-radius:8px;padding:.5rem;background:var(--card)" '+(idx===0?'open':'')+'>'+
                '<summary style="cursor:pointer;font-weight:600;font-size:.8rem;outline:none">'+
                  esc(field(sd,"subject"))+' <span style="font-weight:normal;font-size:.74rem;color:var(--muted)">('+dt(field(sd,"created_at"))+' · '+method+')</span>'+
                '</summary>'+
                '<div style="margin-top:.5rem;font-size:.82rem;line-height:1.55;border-top:1px solid var(--line);padding-top:.5rem;white-space:pre-wrap">'+
                  esc(field(sd,"body"))+
                '</div>'+
              '</details>';
            }).join("");
        }

        var lc={
          REPLY_RECEIVED: {color: "--blue", label: "Inbound Reply"},
          STATUS_CHANGE: {color: "--purple", label: "Status Change"},
          PROMISE_MADE: {color: "--low", label: "Promise Recorded"},
          NOTE: {color: "--muted", label: "Internal Note"},
          EMAIL_SENT: {color: "--low", label: "Email Sent"},
          STATUS_CHANGED: {color: "--purple", label: "Status Update"},
          AUTO_SENT: {color: "--low", label: "Auto-sent Email"},
          SENT: {color: "--low", label: "Approved Email"}
        };
        var renderTimeline = function(evs){
          return evs.length ? evs.map(function(e){
            var k = field(e,"kind")||"";
            var cfg = lc[k] || {color: "--gold", label: k.replace(/_/g," ")};
            return '<div class="ev"><span class="dot" style="background:var('+cfg.color+')"></span><div class="when">'+dt(field(e,"created_at"))+' · <b>'+esc(cfg.label)+'</b></div><div class="what">'+esc(field(e,"summary")||"")+'</div></div>';
          }).join("") : '<div class="muted">No history yet.</div>';
        };

        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">'+esc(field(i,"invoice_no"))+'</div><h1 style="font-size:1.3rem">'+esc(field(c,"name")||"")+(field(c,"vip")?' <span style="color:var(--gold)">★ VIP</span>':'')+'</h1></div><button class="x" onclick="closeDrawer()">×</button></div><div class="db"><div class="kv"><span class="k">Amount</span><span class="num">'+money(field(i,"amount"),field(i,"currency"))+'</span><span class="k">Due</span><span>'+String(field(i,"due_date")||"").slice(0,10)+' · '+(Number(field(i,"days_overdue")||0))+'d overdue</span><span class="k">Stage</span><span>'+stageChip(field(i,"stage"))+' '+riskChip(field(i,"risk_level"))+'</span><span class="k">Status</span><span>'+statusChip(field(i,"status"))+'</span><span class="k">Follow-ups</span><span>'+(field(i,"followup_count")||0)+'</span>'+(field(c,"email")?'<span class="k">Email</span><span class="muted">'+esc(field(c,"email"))+'</span>':"")+'</div><div style="display:flex;gap:.4rem;margin-bottom:.8rem;flex-wrap:wrap">'+drawerActions+'</div><h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:.2rem 0 .5rem">Latest draft</h2>'+mailHtml+acts+sentEmailsHtml+'<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:1.2rem 0 .3rem">History</h2><div class="timeline">'+renderTimeline(evs)+'</div></div>';openDrawerEl()};
      window.approveEdited=function(id){var t=$("edit_body");var b=t?t.value:null;action(b?{action:"approve",draft_id:id,edited_body:b}:{action:"approve",draft_id:id},"Approved & sent");closeDrawer()};
      window.openCustomer=function(cid){var c=clientOf(cid);var invs=invoicesForClient(cid);var evs=STATE.interactions.filter(function(e){return field(e,"client_id")===cid}).slice(0,12);var out=invs.filter(function(i){return field(i,"status")==="ACTIVE"}).reduce(function(a,i){return a+Number(field(i,"amount")||0)},0);
        var lc={
          REPLY_RECEIVED: {color: "--blue", label: "Inbound Reply"},
          STATUS_CHANGE: {color: "--purple", label: "Status Change"},
          PROMISE_MADE: {color: "--low", label: "Promise Recorded"},
          NOTE: {color: "--muted", label: "Internal Note"},
          EMAIL_SENT: {color: "--low", label: "Email Sent"},
          STATUS_CHANGED: {color: "--purple", label: "Status Update"},
          AUTO_SENT: {color: "--low", label: "Auto-sent Email"},
          SENT: {color: "--low", label: "Approved Email"}
        };
        var renderTimeline = function(evs){
          return evs.length ? evs.map(function(e){
            var k = field(e,"kind")||"";
            var cfg = lc[k] || {color: "--gold", label: k.replace(/_/g," ")};
            return '<div class="ev"><span class="dot" style="background:var('+cfg.color+')"></span><div class="when">'+dt(field(e,"created_at"))+' · <b>'+esc(cfg.label)+'</b></div><div class="what">'+esc(field(e,"summary")||"")+'</div></div>';
          }).join("") : '<div class="muted">No history yet.</div>';
        };
        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">Customer</div><h1 style="font-size:1.3rem">'+esc(field(c,"name"))+(field(c,"vip")?' <span style="color:var(--gold)">★</span>':'')+'</h1></div><button class="x" onclick="closeDrawer()">×</button></div><div class="db"><div class="kv"><span class="k">Email</span><span class="muted">'+esc(field(c,"email"))+'</span><span class="k">Outstanding</span><span class="num">'+money(out)+'</span><span class="k">Behavior</span><span>'+esc(field(c,"payment_behavior")||"AVERAGE")+'</span>'+(field(c,"notes")?'<span class="k">Notes</span><span>'+esc(field(c,"notes"))+'</span>':"")+'</div>'+
          '<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:.2rem 0 .5rem">Invoices ('+invs.length+')</h2><table><tbody>'+invs.map(function(i){return '<tr class="clickable" onclick="openInvoice(\''+field(i,"id")+'\')"><td><b>'+esc(field(i,"invoice_no"))+'</b></td><td class="num">'+money(field(i,"amount"),field(i,"currency"))+'</td><td>'+stageChip(field(i,"stage"))+'</td><td>'+statusChip(field(i,"status"))+'</td></tr>'}).join("")+'</tbody></table>'+
          '<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:1.1rem 0 .3rem">Relationship history</h2><div class="timeline">'+renderTimeline(evs)+'</div></div>';openDrawerEl()};

      window.seedWithCount=async function(count){
        setBusy(true,"Seeding "+count+" customers & invoices…");
        try{
          await invokeFn("seed_demo",{enqueue:true, count:count});
          await loadData();
          render(true);
          toast("Demo data seeded with "+count+" invoices");
        }catch(e){
          toast("⚠ "+e.message);
        }
        setBusy(false);
      };

      window.simulateReplyForInvoice=function(invId){
        closeDrawer();
        var i=invoiceOf(invId);
        var c=clientOf(field(i,"client_id"));
        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">Simulate Reply</div><h1 style="font-size:1.3rem">Simulate reply from '+esc(field(c,"name")||"customer")+'</h1></div><button class="x" onclick="closeDrawer()">×</button></div><div class="db"><p class="muted" style="font-size:.82rem">Enter reply text representing what this customer wrote back. The AI will classify it (promise / dispute / paid / question) and take the correct side effects.</p><label class="fld"><span class="lbl">Invoice</span><input type="text" id="lr_inv_display" value="'+esc(field(i,"invoice_no"))+'" disabled style="opacity:0.7"><input type="hidden" id="lr_inv" value="'+invId+'"></label><label class="fld"><span class="lbl">Reply text</span><textarea id="lr_body" placeholder="e.g. Apologies for the delay — we will pay by Friday."></textarea></label><div style="margin-top:1rem;display:flex;gap:.5rem"><button class="btn gold" onclick="submitReply()">Process reply</button><button class="btn sm ghost" onclick="openInvoice(\''+invId+'\')">Back to invoice</button></div></div>';
        openDrawerEl();
      };
    </script>
  </body>

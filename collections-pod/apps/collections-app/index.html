<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Collections Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
      :root{color-scheme:light;--paper:#faf8f3;--card:#fffdf8;--ink:#1c1a17;--muted:#6f6658;--line:#ece6da;--gold:#c9a227;--serif:"Fraunces",ui-serif,Georgia,serif;--sans:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--mono:ui-monospace,"SF Mono",Menlo,monospace;--glow:#fdf6e6;--chip:#f3efe6;--low:#5c7a53;--med:#b8862b;--high:#b4452f;--blue:#3b6ea5;--purple:#7a5c7e;}
      [data-theme="dark"]{color-scheme:dark;--paper:#15130d;--card:#1e1b14;--ink:#f1ead9;--muted:#a99f8b;--line:#2e2a20;--gold:#e0bd4a;--glow:#241e10;--chip:#2c281f;}
      *{box-sizing:border-box}
      body{margin:0;min-height:100dvh;background:radial-gradient(120% 90% at 100% 0%,var(--glow) 0%,rgba(0,0,0,0) 55%),var(--paper);color:var(--ink);font-family:var(--sans);font-size:14.5px;line-height:1.5}
      .wrap{max-width:1200px;margin:0 auto;padding:clamp(1rem,3vw,2rem)}
      .top{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
      .eyebrow{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:600}
      h1{font-family:var(--serif);font-weight:500;font-size:clamp(1.5rem,3.5vw,2.1rem);letter-spacing:-.015em;margin:0;line-height:1.05}
      .pill{display:inline-flex;align-items:center;gap:.45rem;font-size:.78rem;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:.35rem .75rem}
      .pip{width:8px;height:8px;border-radius:50%;background:var(--low);animation:pulse 2.4s infinite}
      @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(92,122,83,.45)}70%{box-shadow:0 0 0 7px rgba(92,122,83,0)}100%{box-shadow:0 0 0 0 rgba(92,122,83,0)}}
      .pill button{font:inherit;cursor:pointer;border:none;background:none;color:var(--ink);padding:0;font-size:.95rem}
      .btn{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:.5rem .9rem;font-weight:600;font-size:.83rem;transition:.15s}
      .btn:hover{border-color:var(--gold)} .btn.gold{background:var(--gold);border-color:var(--gold);color:#1c1a17}
      .btn.sm{padding:.32rem .6rem;font-size:.76rem;border-radius:8px} .btn.ghost{background:none}
      .btn.danger:hover{border-color:var(--high);color:var(--high)} .btn:disabled{opacity:.5;cursor:default}
      .menu{position:relative;display:inline-block}
      .menu .items{position:absolute;right:0;top:110%;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 40px rgba(0,0,0,.12);padding:.4rem;min-width:200px;z-index:20;display:none}
      .menu.open .items{display:block}
      .menu .items button{display:block;width:100%;text-align:left;font:inherit;font-size:.84rem;background:none;border:none;color:var(--ink);padding:.5rem .6rem;border-radius:8px;cursor:pointer}
      .menu .items button:hover{background:var(--glow)} .menu .items hr{border:none;border-top:1px solid var(--line);margin:.3rem 0}
      .tabs{display:flex;gap:.3rem;flex-wrap:wrap;margin:1.2rem 0 1rem;border-bottom:1px solid var(--line);padding-bottom:.2rem}
      .tabs button{font:inherit;font-size:.86rem;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);padding:.5rem .8rem;border-radius:9px 9px 0 0;position:relative}
      .tabs button.on{color:var(--ink)} .tabs button.on::after{content:"";position:absolute;left:.6rem;right:.6rem;bottom:-.25rem;height:2px;background:var(--gold);border-radius:2px}
      .tabs .badge{display:inline-block;min-width:18px;text-align:center;font-size:.7rem;background:var(--chip);border-radius:999px;padding:.05rem .35rem;margin-left:.35rem;color:var(--ink)}
      .tabs .badge.hot{background:var(--high);color:#fff}
      .usecase{display:flex;gap:.6rem;align-items:flex-start;background:color-mix(in srgb,var(--gold) 8%,transparent);border:1px solid color-mix(in srgb,var(--gold) 28%,transparent);border-radius:12px;padding:.6rem .85rem;margin-bottom:1rem;font-size:.82rem}
      .usecase .who{font-weight:700;color:var(--gold-ink,var(--ink))}
      .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.7rem;margin-bottom:1.1rem}
      .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:.85rem 1rem}
      .stat .n{font-family:var(--serif);font-size:1.6rem;line-height:1} .stat .l{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:.4rem}
      .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1.1rem 1.2rem;margin-bottom:1rem}
      .panel h2{font-family:var(--serif);font-weight:500;font-size:1.05rem;margin:0 0 .8rem}
      table{width:100%;border-collapse:collapse;font-size:.84rem} th{text-align:left;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;padding:.4rem .5rem;border-bottom:1px solid var(--line)}
      td{padding:.55rem .5rem;border-bottom:1px solid var(--line);vertical-align:middle}
      tr.clickable{cursor:pointer} tr.clickable:hover td{background:var(--glow)}
      .num{font-variant-numeric:tabular-nums;font-family:var(--mono);font-size:.82rem}
      .chip{display:inline-block;font-size:.7rem;font-weight:700;padding:.12rem .5rem;border-radius:999px;white-space:nowrap}
      .muted{color:var(--muted)} .row-actions{display:flex;gap:.35rem;flex-wrap:wrap}
      .empty{text-align:center;color:var(--muted);padding:2rem 1rem} .empty .big{font-size:1.4rem;font-family:var(--serif);color:var(--ink);margin-bottom:.3rem}
      .scrim{position:fixed;inset:0;background:rgba(20,16,8,.4);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.2s;z-index:40} .scrim.on{opacity:1;pointer-events:auto}
      .drawer{position:fixed;top:0;right:0;height:100dvh;width:min(580px,95vw);background:var(--paper);border-left:1px solid var(--line);transform:translateX(100%);transition:.25s;z-index:50;overflow-y:auto} .drawer.on{transform:none}
      .drawer .dh{position:sticky;top:0;background:var(--paper);border-bottom:1px solid var(--line);padding:1rem 1.2rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem} .drawer .db{padding:1.1rem 1.2rem}
      .x{font:inherit;cursor:pointer;border:none;background:none;font-size:1.3rem;color:var(--muted);line-height:1}
      .kv{display:grid;grid-template-columns:auto 1fr;gap:.3rem 1rem;font-size:.84rem;margin:.4rem 0 1rem} .kv .k{color:var(--muted)}
      .mail{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:.9rem 1rem;white-space:pre-wrap;font-size:.84rem;line-height:1.6} .mail .subj{font-weight:700;margin-bottom:.5rem;font-family:var(--serif);font-size:1rem}
      .timeline{margin:.5rem 0 0;padding-left:.2rem} .timeline .ev{position:relative;padding:.4rem 0 .6rem .9rem;border-left:2px solid var(--line);margin-left:.2rem} .timeline .ev .dot{position:absolute;left:-7px;top:.55rem;width:10px;height:10px;border-radius:50%;background:var(--gold);border:2px solid var(--paper)} .timeline .ev .when{font-size:.7rem;color:var(--muted)} .timeline .ev .what{font-size:.84rem}
      textarea,input,select{font:inherit;font-size:.84rem;width:100%;background:var(--paper);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:.5rem .6rem}
      textarea{min-height:120px;resize:vertical;font-family:var(--mono);font-size:.8rem;line-height:1.5}
      label.fld{display:block;margin:.6rem 0} label.fld .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.25rem;display:block}
      .toggle{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--line);font-size:.86rem}
      .grid2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem} @media(max-width:680px){.grid2{grid-template-columns:1fr}}
      .guide{background:var(--chip);border-radius:10px;padding:.7rem .85rem;font-size:.8rem;line-height:1.55;margin-top:.5rem} .guide code{font-family:var(--mono);background:var(--card);padding:.05rem .35rem;border-radius:5px} .guide ol{margin:.3rem 0 0 1rem;padding:0}
      .center{min-height:80dvh;display:grid;place-items:center;text-align:center}
      .toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(2rem);background:var(--ink);color:var(--paper);padding:.6rem 1.1rem;border-radius:10px;font-size:.84rem;opacity:0;transition:.25s;z-index:80} .toast.on{opacity:1;transform:translateX(-50%)}
      .busy{position:fixed;inset:0;background:rgba(20,16,8,.35);backdrop-filter:blur(3px);display:none;place-items:center;z-index:90} .busy.on{display:grid}
      .busy .box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1.4rem 1.8rem;text-align:center;min-width:220px}
      .spin{display:inline-block;width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite} @keyframes sp{to{transform:rotate(360deg)}}
      .working{display:flex;align-items:center;gap:.5rem;background:color-mix(in srgb,var(--blue) 10%,transparent);border:1px solid color-mix(in srgb,var(--blue) 30%,transparent);border-radius:10px;padding:.5rem .8rem;margin-bottom:1rem;font-size:.83rem}
      .hero{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:1.2rem;background:linear-gradient(135deg,var(--card),var(--glow));border:1px solid var(--line);border-radius:18px;padding:1.2rem 1.4rem;margin-bottom:1rem}
      .hero .big{font-family:var(--serif);font-size:clamp(2rem,5.5vw,2.9rem);line-height:1;letter-spacing:-.02em}
      .hero .sub{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:.45rem}
      .hero .minis{display:flex;gap:1.5rem}
      .hero .mini .n{font-family:var(--serif);font-size:1.5rem;line-height:1}
      .hero .mini .l{font-size:.64rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:.3rem}
      .needs{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:.7rem;margin-bottom:1rem}
      .acard{cursor:pointer;text-align:left;font:inherit;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--ac,var(--gold));border-radius:14px;padding:.8rem .95rem;transition:.15s}
      .acard:hover{border-color:var(--ac,var(--gold));transform:translateY(-1px)}
      .acard .acn{font-family:var(--serif);font-size:1.75rem;line-height:1;color:var(--ac,var(--ink))}
      .acard .acl{font-weight:700;font-size:.84rem;margin-top:.3rem}
      .acard .acs{font-size:.73rem;color:var(--muted);margin-top:.15rem}
      .allclear{display:flex;align-items:center;gap:.7rem;background:color-mix(in srgb,var(--low) 11%,transparent);border:1px solid color-mix(in srgb,var(--low) 32%,transparent);border-radius:14px;padding:.85rem 1.1rem;margin-bottom:1rem;font-size:.86rem}
      .split{display:grid;grid-template-columns:1fr 1fr;gap:1rem}@media(max-width:760px){.split{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <div id="app"><div class="center"><p>Loading Collections Agent…</p></div></div>
    <div class="scrim" id="scrim" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer"></div>
    <div class="toast" id="toast"></div>
    <div class="busy" id="busy"><div class="box"><div class="spin"></div><p id="busymsg" style="margin:.7rem 0 0">Working…</p></div></div>
    <input type="file" id="csvfile" accept=".csv,.xlsx,.xls" style="display:none" />

    <script>
      (function(){var cfg=window.__LEMMA_CONFIG__||{};var base=(cfg.apiUrl||location.origin).replace(/\/$/,"");var c=document.createElement("script");c.src=base+"/public/sdk/lemma-client.js";c.onload=function(){var u=document.createElement("script");u.src=base+"/public/sdk/lemma-ui.js";u.onload=boot;u.onerror=boot;document.head.appendChild(u)};c.onerror=function(){fatal("Couldn't load the Lemma SDK.")};document.head.appendChild(c);})();
      var client,ME={},STATE={clients:[],invoices:[],drafts:[],interactions:[],promises:[],config:{}},TAB="dashboard";
      function $(id){return document.getElementById(id)}
      function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})}
      function field(r,k){return (r&&r.data&&r.data[k]!=null)?r.data[k]:(r?r[k]:undefined)}
      function listOf(r){return (r&&(r.items||r.data))||(Array.isArray(r)?r:[])}
      function fatal(m){$("app").innerHTML='<div class="center"><div><h1>⚠</h1><p>'+esc(m)+'</p></div></div>'}
      function theme(){try{return localStorage.getItem("ca-theme")||"light"}catch(e){return "light"}}
      function applyTheme(t){document.documentElement.setAttribute("data-theme",t);try{localStorage.setItem("ca-theme",t)}catch(e){}}
      function toast(m){var t=$("toast");t.textContent=m;t.classList.add("on");setTimeout(function(){t.classList.remove("on")},2600)}
      function setBusy(on,msg){$("busy").classList.toggle("on",!!on);if(msg)$("busymsg").textContent=msg}
      function money(v,cur){cur=cur||"INR";return (cur==="INR"?"₹":cur+" ")+Number(v||0).toLocaleString("en-IN")}
      function shortDate(s){if(!s)return"";var d=new Date(s);return isNaN(d)?String(s).slice(0,10):d.toLocaleDateString(undefined,{month:"short",day:"numeric"})}
      function dt(s){if(!s)return"";var d=new Date(s);return isNaN(d)?String(s):d.toLocaleString(undefined,{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
      var STAGE_C={PENDING:"--muted",STAGE_1:"--low",STAGE_2:"--med",STAGE_3:"--med",STAGE_4:"--high",ESCALATED:"--purple"};
      var RISK_C={LOW:"--low",MEDIUM:"--med",HIGH:"--high"};
      var STATUS_C={ACTIVE:"--blue",PAID:"--low",DISPUTED:"--med",LEGAL:"--purple",PAUSED:"--muted"};
      function chip(t,v){return '<span class="chip" style="background:color-mix(in srgb,var('+v+') 16%,transparent);color:var('+v+')">'+esc(t)+'</span>'}
      function stageChip(s){return chip((s||"").replace("STAGE_","S"),STAGE_C[s]||"--muted")}
      function riskChip(r){return r?chip(r,RISK_C[r]||"--muted"):'<span class="muted">—</span>'}
      function statusChip(s){return chip(s,STATUS_C[s]||"--muted")}
      function draftChip(s){var m={AUTO_SENT:"--low",SENT:"--low",PENDING_REVIEW:"--med",REJECTED:"--muted",FAILED:"--high"};return chip(s.replace("_"," "),m[s]||"--muted")}

      async function boot(){applyTheme(theme());try{client=new window.LemmaClient.LemmaClient();var a=await client.initialize();if(a.status!=="authenticated")return signIn();ME=a.user||{};await loadData();render();subscribe();}catch(e){fatal((e&&e.message)||"error")}}
      function signIn(){$("app").innerHTML='<div class="center"><div><div class="eyebrow">Collections Agent</div><h1>Welcome.</h1><p class="muted" style="margin:.6rem 0 1rem">Sign in to open the desk.</p><button class="btn gold" id="si">Sign in</button></div></div>';$("si").onclick=function(){client.auth.redirectToAuth()}}

      async function loadData(){
        var r=await Promise.all([client.records.list("clients",{limit:1000}),client.records.list("invoices",{limit:1000}),client.records.list("drafts",{limit:2000}),client.records.list("interactions",{limit:400,sort:[{field:"created_at",direction:"desc"}]}),client.records.list("promises",{limit:500}),client.records.list("pod_config",{limit:1}),client.records.list("followup_queue",{limit:1000})]);
        STATE.clients=listOf(r[0]);STATE.invoices=listOf(r[1]);STATE.drafts=listOf(r[2]);STATE.interactions=listOf(r[3]);STATE.promises=listOf(r[4]);STATE.config=listOf(r[5])[0]||{};STATE.queue=listOf(r[6]);
      }
      function clientOf(id){return STATE.clients.find(function(c){return field(c,"id")===id})||{}}
      function invoiceOf(id){return STATE.invoices.find(function(i){return field(i,"id")===id})||{}}
      function invoicesForClient(cid){return STATE.invoices.filter(function(i){return field(i,"client_id")===cid})}
      function latestDraft(invId,st){var ds=STATE.drafts.filter(function(d){return field(d,"invoice_id")===invId&&(!st||st.indexOf(field(d,"status"))>=0)});ds.sort(function(a,b){return String(field(b,"created_at")).localeCompare(String(field(a,"created_at")))});return ds[0]}
      function pendingDrafts(){return STATE.drafts.filter(function(d){return field(d,"status")==="PENDING_REVIEW"})}
      function replies(){return STATE.interactions.filter(function(e){return field(e,"kind")==="REPLY_RECEIVED"})}
      function processingCount(){return (STATE.queue||[]).filter(function(q){return ["QUEUED","PROCESSING"].indexOf(field(q,"status"))>=0}).length}

      var _t=null;function subscribe(){try{if(client.datastore&&client.datastore.watchChanges){client.datastore.watchChanges({onChange:function(){clearTimeout(_t);_t=setTimeout(async function(){await loadData();if(TAB!=="ask")render(true)},800)}})}}catch(e){}}

      // Run a pod function through the SDK so auth (bearer OR cookie session) is handled
      // correctly on local AND cloud. The old raw-fetch path used localStorage["lemma_token"],
      // which is empty under a cloud cookie session — that broke every write action.
      async function invokeFn(name,input){
        if(client&&client.functions&&client.functions.run){
          var r=await client.functions.run(name,{input:input||{}});
          if(r==null)return r;
          return (r.output_data!=null)?r.output_data:((r.outputData!=null)?r.outputData:r);
        }
        var cfg=window.__LEMMA_CONFIG__||{};var base=(cfg.apiUrl||location.origin).replace(/\/$/,"");var tok="";try{tok=localStorage.getItem("lemma_token")||""}catch(e){}
        var res=await fetch(base+"/pods/"+cfg.podId+"/functions/"+name+"/runs",{method:"POST",headers:{"Authorization":"Bearer "+tok,"Content-Type":"application/json"},body:JSON.stringify({input_data:input})});
        if(!res.ok)throw new Error(name+" failed ("+res.status+")");return (await res.json()).output_data;
      }
      async function action(input,msg){try{var o=await invokeFn("app_action",input);await loadData();render(true);toast(msg||(o&&o.detail)||"Done");return o}catch(e){toast("⚠ "+(e.message||"failed"))}}
      window.doScan=async function(){setBusy(true,"Scanning overdue invoices…");try{await invokeFn("app_action",{action:"scan"});await loadData();render(true);toast("Scan started — the agent is drafting follow-ups")}catch(e){toast("⚠ "+e.message)}setBusy(false)};
      window.doProcess=function(id){action({action:"process",invoice_id:id},"Queued for the agent")};

      // ---- data tools
      window.seedDemo=async function(){
        var raw=prompt("How many invoices do you want to seed? (e.g. 10, 20, 50)", "20");
        if(raw===null)return;
        var count=parseInt(raw,10);
        var payload={enqueue:true};
        if(!isNaN(count) && count>0) payload.count=count;
        setBusy(true,"Seeding "+(payload.count||"demo")+" customers & invoices…");
        try{await invokeFn("seed_demo",payload);await loadData();render(true);toast("Demo data seeded — agent is processing")}catch(e){toast("⚠ "+e.message)}setBusy(false);
      };
      window.seedReplies=async function(){setBusy(true,"Seeding customer replies…");try{await invokeFn("seed_replies",{});await loadData();render(true);toast("Replies seeded")}catch(e){toast("⚠ "+e.message)}setBusy(false)};
      window.sendDigest=async function(){setBusy(true,"Sending digest to team…");try{var o=await invokeFn("app_action",{action:"digest"});await loadData();render(true);toast(o&&o.detail||"Digest sent")}catch(e){toast("⚠ "+e.message)}setBusy(false)};
      window.logReply=function(){closeMenu();var opts=STATE.invoices.filter(function(i){return field(i,"status")==="ACTIVE"}).map(function(i){var c=clientOf(field(i,"client_id"));return '<option value="'+field(i,"id")+'">'+esc(field(i,"invoice_no"))+' · '+esc(field(c,"name")||"")+'</option>'}).join("");
        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">Inbound</div><h1 style="font-size:1.3rem">Log a customer reply</h1></div><button class="x" onclick="closeDrawer()">×</button></div><div class="db"><p class="muted" style="font-size:.82rem">Paste a reply — it is classified and the account updated (promise / dispute / paid / question), exactly like the live mailbox would.</p><label class="fld"><span class="lbl">Invoice</span><select id="lr_inv">'+opts+'</select></label><label class="fld"><span class="lbl">Reply text</span><textarea id="lr_body" placeholder="e.g. We will clear this by Friday."></textarea></label><button class="btn gold" onclick="submitReply()">Process reply</button></div>';openDrawerEl()};
      window.submitReply=async function(){var id=$("lr_inv").value,body=$("lr_body").value.trim();if(!body)return toast("Paste the reply text");setBusy(true,"Reading the reply…");try{var o=await invokeFn("handle_reply",{invoice_id:id,body:body});await loadData();render(true);closeDrawer();toast("Reply classified: "+(o&&o.category)+" — "+(o&&o.detail))}catch(e){toast("⚠ "+e.message)}setBusy(false)};
      window.resetData=async function(){if(!confirm("Delete ALL customers, invoices, drafts and history? (Settings are kept.)"))return;setBusy(true,"Resetting…");try{await invokeFn("reset_pod",{confirm:true});await loadData();render(true);toast("All data cleared")}catch(e){toast("⚠ "+e.message)}setBusy(false)};
      window.exportCSV=function(){
        var rows=[["invoice_no","client_name","client_email","amount","currency","due_date","days_overdue","stage","status","risk_level","followup_count","payment_link"]];

        }
        setBusy(false);
      };
      window.exportSentCSV=function(){
        var rows=[["customer_name","customer_email","invoice_no","subject","body","stage","status","sent_at"]];
        var sent=STATE.drafts.filter(function(d){return ["SENT","AUTO_SENT"].indexOf(field(d,"status"))>=0});
        sent.forEach(function(d){
          var i=invoiceOf(field(d,"invoice_id")),c=clientOf(field(d,"client_id"));
          rows.push([
            field(c,"name"),
            field(c,"email"),
            field(i,"invoice_no"),
            field(d,"subject"),
            field(d,"body"),
            field(d,"stage"),
            field(d,"status"),
            field(d,"created_at")
          ]);
        });
        var csv=rows.map(function(r){return r.map(function(x){x=String(x==null?"":x);return /[",\n]/.test(x)?'"'+x.replace(/"/g,'""')+'"':x}).join(",")}).join("\n");
        var blob=new Blob([csv],{type:"text/csv"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="sent_emails_export.csv";a.click();toast("Exported "+sent.length+" sent emails");
      };
      window.openSentEmail=function(draftId){
        var d=STATE.drafts.find(function(x){return field(x,"id")===draftId});
        if(!d)return;
        var i=invoiceOf(field(d,"invoice_id")),c=clientOf(field(d,"client_id"));
        var method = field(d,"status")==="AUTO_SENT"?"Auto-sent by AI":"Approved by human reviewer";
        var confidence = field(d,"confidence_score") != null ? (Math.round(field(d,"confidence_score")*100)+"%") : "N/A";
        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">Sent Communication</div><h1 style="font-size:1.3rem">'+esc(field(c,"name")||"")+'</h1></div><button class="x" onclick="closeDrawer()">×</button></div>'+
          '<div class="db">'+
            '<div class="kv">'+
              '<span class="k">Invoice</span><span>'+esc(field(i,"invoice_no")||"")+'</span>'+
              '<span class="k">Stage</span><span>'+stageChip(field(d,"stage"))+'</span>'+
              '<span class="k">Method</span><span>'+chip(field(d,"status")==="AUTO_SENT"?"Auto-sent":"Approved",field(d,"status")==="AUTO_SENT"?"--blue":"--low")+' ('+method+')</span>'+
              '<span class="k">Confidence</span><span>'+confidence+'</span>'+
              '<span class="k">Sent At</span><span>'+dt(field(d,"created_at"))+'</span>'+
            '</div>'+
            '<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:1.2rem 0 .5rem">Email Content</h2>'+
            '<div class="mail"><div class="subj">'+esc(field(d,"subject"))+'</div>'+esc(field(d,"body"))+'</div>'+
            '<div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap">'+
              '<button class="btn sm" onclick="openInvoice(\''+field(d,"invoice_id")+'\')">View invoice</button>'+
              '<button class="btn sm gold" onclick="simulateReplyForInvoice(\''+field(d,"invoice_id")+'\')">💬 Simulate reply</button>'+
              '<button class="btn sm ghost" onclick="closeDrawer()">Close</button>'+
            '</div>'+
          '</div>';
        openDrawerEl();
      };
      window.openInvoice=function(id){
        var i=invoiceOf(id),c=clientOf(field(i,"client_id"));
        var d=latestDraft(id,["PENDING_REVIEW","AUTO_SENT","SENT","FAILED","REJECTED"]);
        var evs=STATE.interactions.filter(function(e){return field(e,"invoice_id")===id});
        var pending=d&&field(d,"status")==="PENDING_REVIEW";
        var mailHtml=d?('<div class="mail"><div class="subj">'+esc(field(d,"subject"))+'</div>'+(pending?'<textarea id="edit_body">'+esc(field(d,"body"))+'</textarea>':esc(field(d,"body")))+'</div>'):'<div class="muted">No draft yet.</div>';
        var acts=pending?'<div class="row-actions" style="margin-top:.7rem"><button class="btn gold sm" onclick="approveEdited(\''+field(d,"id")+'\')">Approve &amp; send</button><button class="btn sm danger" onclick="reject(\''+field(d,"id")+'\');closeDrawer()">Reject</button><button class="btn sm danger" onclick="flag(\''+field(d,"id")+'\');closeDrawer()">Legal</button></div>':'';
        
        var drawerActions = "";
        if (field(i,"status") === "ACTIVE") {
          drawerActions += '<button class="btn sm" onclick="doProcess(\''+id+'\')">Process now</button> '+
            '<button class="btn sm" onclick="doProcess(\''+id+'\')">Regenerate</button> ';
        }
        
        var statusButtons = "";
        var currentStatus = field(i,"status");
        if (currentStatus === "ACTIVE") {
          statusButtons = '<button class="btn sm" onclick="changeStatus(\''+id+'\',\'PAID\')">✓ Paid</button> '+
            '<button class="btn sm" onclick="changeStatus(\''+id+'\',\'PAUSED\')">⏸ Pause</button> '+
            '<button class="btn sm" onclick="changeStatus(\''+id+'\',\'DISPUTED\')">⚡ Dispute</button> '+
            '<button class="btn sm danger" onclick="changeStatus(\''+id+'\',\'LEGAL\')">⚖ Legal</button>';
        } else if (currentStatus === "PAUSED" || currentStatus === "DISPUTED") {
          statusButtons = '<button class="btn sm gold" onclick="changeStatus(\''+id+'\',\'ACTIVE\')">▶ Reactivate</button> '+
            '<button class="btn sm danger" onclick="changeStatus(\''+id+'\',\'LEGAL\')">⚖ Legal</button>';
        } else if (currentStatus === "LEGAL") {
          statusButtons = '<button class="btn sm gold" onclick="changeStatus(\''+id+'\',\'ACTIVE\')">▶ Reactivate</button>';
        }
        drawerActions += statusButtons;
        
        var sentDrafts=STATE.drafts.filter(function(x){
          return field(x,"invoice_id")===id && ["SENT","AUTO_SENT"].indexOf(field(x,"status"))>=0;
        }).sort(function(a,b){return String(field(b,"created_at")).localeCompare(String(field(a,"created_at")))});

        if (sentDrafts.length > 0 && field(i,"status") === "ACTIVE") {
          drawerActions += ' <button class="btn sm gold" onclick="simulateReplyForInvoice(\''+id+'\')">💬 Simulate reply</button>';
        }
        
        var sentEmailsHtml = "";
        if (sentDrafts.length) {
          sentEmailsHtml = '<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:1.2rem 0 .5rem">All sent emails ('+sentDrafts.length+')</h2>'+
            sentDrafts.map(function(sd, idx){
              var method = field(sd,"status")==="AUTO_SENT"?"Auto-sent by AI":"Approved by human";
              return '<details style="margin-bottom:.5rem;border:1px solid var(--line);border-radius:8px;padding:.5rem;background:var(--card)" '+(idx===0?'open':'')+'>'+
                '<summary style="cursor:pointer;font-weight:600;font-size:.8rem;outline:none">'+
                  esc(field(sd,"subject"))+' <span style="font-weight:normal;font-size:.74rem;color:var(--muted)">('+dt(field(sd,"created_at"))+' · '+method+')</span>'+
                '</summary>'+
                '<div style="margin-top:.5rem;font-size:.82rem;line-height:1.55;border-top:1px solid var(--line);padding-top:.5rem;white-space:pre-wrap">'+
                  esc(field(sd,"body"))+
                '</div>'+
              '</details>';
            }).join("");
        }

        var lc={
          REPLY_RECEIVED: {color: "--blue", label: "Inbound Reply"},
          STATUS_CHANGE: {color: "--purple", label: "Status Change"},
          PROMISE_MADE: {color: "--low", label: "Promise Recorded"},
          NOTE: {color: "--muted", label: "Internal Note"},
          EMAIL_SENT: {color: "--low", label: "Email Sent"},
          STATUS_CHANGED: {color: "--purple", label: "Status Update"},
          AUTO_SENT: {color: "--low", label: "Auto-sent Email"},
          SENT: {color: "--low", label: "Approved Email"}
        };
        var renderTimeline = function(evs){
          return evs.length ? evs.map(function(e){
            var k = field(e,"kind")||"";
            var cfg = lc[k] || {color: "--gold", label: k.replace(/_/g," ")};
            return '<div class="ev"><span class="dot" style="background:var('+cfg.color+')"></span><div class="when">'+dt(field(e,"created_at"))+' · <b>'+esc(cfg.label)+'</b></div><div class="what">'+esc(field(e,"summary")||"")+'</div></div>';
          }).join("") : '<div class="muted">No history yet.</div>';
        };

        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">'+esc(field(i,"invoice_no"))+'</div><h1 style="font-size:1.3rem">'+esc(field(c,"name")||"")+(field(c,"vip")?' <span style="color:var(--gold)">★ VIP</span>':'')+'</h1></div><button class="x" onclick="closeDrawer()">×</button></div><div class="db"><div class="kv"><span class="k">Amount</span><span class="num">'+money(field(i,"amount"),field(i,"currency"))+'</span><span class="k">Due</span><span>'+String(field(i,"due_date")||"").slice(0,10)+' · '+(Number(field(i,"days_overdue")||0))+'d overdue</span><span class="k">Stage</span><span>'+stageChip(field(i,"stage"))+' '+riskChip(field(i,"risk_level"))+'</span><span class="k">Status</span><span>'+statusChip(field(i,"status"))+'</span><span class="k">Follow-ups</span><span>'+(field(i,"followup_count")||0)+'</span>'+(field(c,"email")?'<span class="k">Email</span><span class="muted">'+esc(field(c,"email"))+'</span>':"")+'</div><div style="display:flex;gap:.4rem;margin-bottom:.8rem;flex-wrap:wrap">'+drawerActions+'</div><h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:.2rem 0 .5rem">Latest draft</h2>'+mailHtml+acts+sentEmailsHtml+'<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:1.2rem 0 .3rem">History</h2><div class="timeline">'+renderTimeline(evs)+'</div></div>';openDrawerEl()};
      window.approveEdited=function(id){var t=$("edit_body");var b=t?t.value:null;action(b?{action:"approve",draft_id:id,edited_body:b}:{action:"approve",draft_id:id},"Approved & sent");closeDrawer()};
      window.openCustomer=function(cid){var c=clientOf(cid);var invs=invoicesForClient(cid);var evs=STATE.interactions.filter(function(e){return field(e,"client_id")===cid}).slice(0,12);var out=invs.filter(function(i){return field(i,"status")==="ACTIVE"}).reduce(function(a,i){return a+Number(field(i,"amount")||0)},0);
        var lc={
          REPLY_RECEIVED: {color: "--blue", label: "Inbound Reply"},
          STATUS_CHANGE: {color: "--purple", label: "Status Change"},
          PROMISE_MADE: {color: "--low", label: "Promise Recorded"},
          NOTE: {color: "--muted", label: "Internal Note"},
          EMAIL_SENT: {color: "--low", label: "Email Sent"},
          STATUS_CHANGED: {color: "--purple", label: "Status Update"},
          AUTO_SENT: {color: "--low", label: "Auto-sent Email"},
          SENT: {color: "--low", label: "Approved Email"}
        };
        var renderTimeline = function(evs){
          return evs.length ? evs.map(function(e){
            var k = field(e,"kind")||"";
            var cfg = lc[k] || {color: "--gold", label: k.replace(/_/g," ")};
            return '<div class="ev"><span class="dot" style="background:var('+cfg.color+')"></span><div class="when">'+dt(field(e,"created_at"))+' · <b>'+esc(cfg.label)+'</b></div><div class="what">'+esc(field(e,"summary")||"")+'</div></div>';
          }).join("") : '<div class="muted">No history yet.</div>';
        };
        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">Customer</div><h1 style="font-size:1.3rem">'+esc(field(c,"name"))+(field(c,"vip")?' <span style="color:var(--gold)">★</span>':'')+'</h1></div><button class="x" onclick="closeDrawer()">×</button></div><div class="db"><div class="kv"><span class="k">Email</span><span class="muted">'+esc(field(c,"email"))+'</span><span class="k">Outstanding</span><span class="num">'+money(out)+'</span><span class="k">Behavior</span><span>'+esc(field(c,"payment_behavior")||"AVERAGE")+'</span>'+(field(c,"notes")?'<span class="k">Notes</span><span>'+esc(field(c,"notes"))+'</span>':"")+'</div>'+
          '<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:.2rem 0 .5rem">Invoices ('+invs.length+')</h2><table><tbody>'+invs.map(function(i){return '<tr class="clickable" onclick="openInvoice(\''+field(i,"id")+'\')"><td><b>'+esc(field(i,"invoice_no"))+'</b></td><td class="num">'+money(field(i,"amount"),field(i,"currency"))+'</td><td>'+stageChip(field(i,"stage"))+'</td><td>'+statusChip(field(i,"status"))+'</td></tr>'}).join("")+'</tbody></table>'+
          '<h2 style="font-family:var(--serif);font-weight:500;font-size:1rem;margin:1.1rem 0 .3rem">Relationship history</h2><div class="timeline">'+renderTimeline(evs)+'</div></div>';openDrawerEl()};

      window.seedWithCount=async function(count){
        setBusy(true,"Seeding "+count+" customers & invoices…");
        try{
          await invokeFn("seed_demo",{enqueue:true, count:count});
          await loadData();
          render(true);
          toast("Demo data seeded with "+count+" invoices");
        }catch(e){
          toast("⚠ "+e.message);
        }
        setBusy(false);
      };

      window.simulateReplyForInvoice=function(invId){
        closeDrawer();
        var i=invoiceOf(invId);
        var c=clientOf(field(i,"client_id"));
        $("drawer").innerHTML='<div class="dh"><div><div class="eyebrow">Simulate Reply</div><h1 style="font-size:1.3rem">Simulate reply from '+esc(field(c,"name")||"customer")+'</h1></div><button class="x" onclick="closeDrawer()">×</button></div><div class="db"><p class="muted" style="font-size:.82rem">Enter reply text representing what this customer wrote back. The AI will classify it (promise / dispute / paid / question) and take the correct side effects.</p><label class="fld"><span class="lbl">Invoice</span><input type="text" id="lr_inv_display" value="'+esc(field(i,"invoice_no"))+'" disabled style="opacity:0.7"><input type="hidden" id="lr_inv" value="'+invId+'"></label><label class="fld"><span class="lbl">Reply text</span><textarea id="lr_body" placeholder="e.g. Apologies for the delay — we will pay by Friday."></textarea></label><div style="margin-top:1rem;display:flex;gap:.5rem"><button class="btn gold" onclick="submitReply()">Process reply</button><button class="btn sm ghost" onclick="openInvoice(\''+invId+'\')">Back to invoice</button></div></div>';
        openDrawerEl();
      };
    </script>
  </body>
</html>
